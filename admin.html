<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Rantiy</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background-color: #0f172a; color: white; display: flex; height: 100vh; overflow: hidden;}
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: #1e293b; padding: 30px; border-radius: 20px; border: 2px solid #22c55e; text-align: center; width: 300px; box-shadow: 0 10px 50px rgba(0,0,0,0.5); }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: none; background: #0f172a; color: white; text-align: center; font-size: 16px; box-sizing: border-box; }
        .login-box button { background: #22c55e; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        .sidebar { width: 250px; background-color: #1e293b; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #334155; }
        .logo-admin { background: linear-gradient(135deg, #22c55e, #15803d); padding: 15px; border-radius: 15px; text-align: center; font-weight: 900; font-size: 20px; margin-bottom: 30px; }
        .nav-btn { background: none; border: none; color: #cbd5e1; text-align: left; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-bottom: 10px;}
        .nav-btn.active { background: #334155; color: white; }
        .btn-logout { margin-top: auto; background: #ef4444; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background-color: #0f172a; color: #94a3b8; font-size: 12px; text-transform: uppercase; }
        .btn-delete { background: #fee2e2; color: #ef4444; padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; width: max-content; border: 1px solid #334155; margin-bottom: 20px;}
        .card .number { font-size: 30px; font-weight: 900; color: #22c55e; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>Rantiy Admin ⚡</h2>
            <input type="password" id="passInput" placeholder="Contraseña">
            <button onclick="validarEntrada()">ENTRAR</button>
            <p id="error-msg" style="color:#ef4444; display:none; margin-top:10px;">Clave incorrecta</p>
        </div>
    </div>

    <div class="sidebar">
        <div class="logo-admin">PANEL R&R</div>
        <button class="nav-btn active">📊 Vitrina (Posts)</button>
        <button class="nav-btn btn-logout" onclick="cerrarSesionAdmin()">🚪 Salir</button>
    </div>

    <div class="main-content">
        <h1>Centro de Control Global</h1>
        <div class="card">
            <h3 style="margin: 0; color: #94a3b8; font-size: 14px;">Total Publicaciones</h3>
            <div class="number" id="stat-posts">0</div>
        </div>

        <table>
            <thead>
                <tr><th>Foto</th><th>Vendedor</th><th>Producto</th><th>Zona</th><th>Acción</th></tr>
            </thead>
            <tbody id="tabla-posts">
                <tr><td colspan="5" style="text-align: center;">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        function validarEntrada() {
            const clave = document.getElementById('passInput').value.trim();
            if (clave === "Rantiy2026") {
                localStorage.setItem('admin_session', 'ADMIN_SUPREMO');
                document.getElementById('login-overlay').style.display = 'none';
                location.reload(); 
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        document.getElementById('passInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') validarEntrada();
        });

        if (localStorage.getItem('admin_session') === "ADMIN_SUPREMO") {
            document.getElementById('login-overlay').style.display = 'none';
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYF0A8d5pyS-HpbqAADi-TTu_BeRoG3jw",
            authDomain: "rantiy-y-rantikuy.firebaseapp.com",
            projectId: "rantiy-y-rantikuy",
            storageBucket: "rantiy-y-rantikuy.firebasestorage.app",
            messagingSenderId: "49676513708",
            appId: "1:49676513708:web:943ad781c98cb7bac78a09"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        if (localStorage.getItem('admin_session') === "ADMIN_SUPREMO") {
            const qPosts = query(collection(db, "inventory"), orderBy("timestamp", "desc"));
            onSnapshot(qPosts, (snapshot) => {
                const tbody = document.getElementById('tabla-posts');
                document.getElementById('stat-posts').innerText = snapshot.size;
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No hay publicaciones.</td></tr>';
                    return;
                }
                let html = '';
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    html += `
                    <tr>
                        <td><img src="${data.img || ''}" style="width: 50px; height: 50px; border-radius: 8px; object-fit: cover;"></td>
                        <td><b>${data.sellerName}</b></td>
                        <td>${data.name}</td>
                        <td>${data.loc}</td>
                        <td><button class="btn-delete" onclick="window.borrarPost('${docSnap.id}')">Eliminar</button></td>
                    </tr>`;
                });
                tbody.innerHTML = html;
            });
        }

        window.borrarPost = async function(id) {
            if(confirm("¿Borrar permanentemente?")) { await deleteDoc(doc(db, "inventory", id)); }
        };

        window.cerrarSesionAdmin = function() {
            localStorage.removeItem('admin_session');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
