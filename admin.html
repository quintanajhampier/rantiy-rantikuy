<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Modo Dios</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background-color: #0f172a; color: white; display: flex; height: 100vh; overflow: hidden;}
        
        /* Sidebar */
        .sidebar { width: 250px; background-color: #1e293b; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #334155; }
        .logo-admin { background: linear-gradient(135deg, #22c55e, #15803d); padding: 15px; border-radius: 15px; text-align: center; font-weight: 900; font-size: 20px; margin-bottom: 30px; letter-spacing: 1px; }
        .nav-btn { background: none; border: none; color: #cbd5e1; text-align: left; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-bottom: 10px; transition: 0.3s;}
        .nav-btn:hover, .nav-btn.active { background: #334155; color: white; }
        .btn-logout { margin-top: auto; background: #ef4444; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* Main Content */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        h1 { margin-top: 0; font-weight: 800; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        
        /* Tablas */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background-color: #0f172a; color: #94a3b8; font-size: 12px; text-transform: uppercase; }
        td { font-size: 14px; }
        
        .btn-action { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-delete { background: #fee2e2; color: #ef4444; }
        .btn-ban { background: #fef3c7; color: #d97706; margin-left: 5px; }

        .stat-cards { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; flex: 1; border: 1px solid #334155; }
        .card h3 { margin: 0; color: #94a3b8; font-size: 14px; }
        .card .number { font-size: 30px; font-weight: 900; color: #22c55e; margin-top: 10px; }
    </style>
</head>
<body>

    <script>
        if (localStorage.getItem('admin_session') !== "ADMIN_SUPREMO") {
            window.location.href = 'index.html'; // Lo expulsa si no es admin
        }
    </script>

    <div class="sidebar">
        <div class="logo-admin">PANEL R&R</div>
        <button class="nav-btn active">📊 Vitrina (Posts)</button>
        <button class="nav-btn btn-logout" onclick="cerrarSesionAdmin()">🚪 Salir del Panel</button>
    </div>

    <div class="main-content">
        <h1>Centro de Control Global</h1>
        
        <div class="stat-cards">
            <div class="card">
                <h3>Total Publicaciones Activas</h3>
                <div class="number" id="stat-posts">0</div>
            </div>
        </div>

        <h3>Gestión de Publicaciones</h3>
        <table>
            <thead>
                <tr>
                    <th>Foto</th>
                    <th>Vendedor</th>
                    <th>Producto</th>
                    <th>Zona</th>
                    <th>Fecha</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-posts">
                <tr><td colspan="6" style="text-align: center;">Cargando base de datos...</td></tr>
            </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYF0A8d5pyS-HpbqAADi-TTu_BeRoG3jw",
            authDomain: "rantiy-y-rantikuy.firebaseapp.com",
            projectId: "rantiy-y-rantikuy",
            storageBucket: "rantiy-y-rantikuy.firebasestorage.app",
            messagingSenderId: "49676513708",
            appId: "1:49676513708:web:943ad781c98cb7bac78a09"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Cargar Publicaciones
        const qPosts = query(collection(db, "inventory"), orderBy("timestamp", "desc"));
        onSnapshot(qPosts, (snapshot) => {
            const tbody = document.getElementById('tabla-posts');
            document.getElementById('stat-posts').innerText = snapshot.size;
            
            if (snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No hay publicaciones en el sistema.</td></tr>';
                return;
            }

            let html = '';
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const fecha = new Date(data.timestamp).toLocaleDateString();
                const imgSrc = (data.img && data.img.startsWith('data:image')) ? data.img : 'https://via.placeholder.com/50';

                html += `
                <tr>
                    <td><img src="${imgSrc}" style="width: 50px; height: 50px; border-radius: 8px; object-fit: cover;"></td>
                    <td><b>${data.sellerName}</b><br><span style="font-size:11px; color:#94a3b8;">${data.sellerPhone}</span></td>
                    <td>${data.name}<br><span style="color:#22c55e; font-weight:bold;">S/ ${data.price}</span></td>
                    <td>${data.loc}</td>
                    <td>${fecha}</td>
                    <td>
                        <button class="btn-action btn-delete" onclick="window.borrarPost('${docSnap.id}')">Eliminar</button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        });

        // Funciones Globales del Admin
        window.borrarPost = async function(id) {
            if(confirm("¿Estás seguro de que quieres eliminar esta publicación permanentemente?")) {
                await deleteDoc(doc(db, "inventory", id));
            }
        };

        window.cerrarSesionAdmin = function() {
            localStorage.removeItem('admin_session');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
