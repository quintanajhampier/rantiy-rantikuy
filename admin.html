<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel R&R - Modo Dios</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="seguridad/firewall.js"></script>
    <style>
        /* Pantalla de Inicio de Sesión */
        #login-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background:#0f172a; display:flex; flex-direction:column;
            justify-content:center; align-items:center; z-index:9999;
        }
        .login-card {
            background:#1e293b; padding:40px; border-radius:20px;
            border:2px solid #22c55e; text-align:center; width:300px;
        }
        .login-card h2 { color:#22c55e; margin-bottom:20px; font-weight:800; }
        .login-card input {
            width:100%; padding:12px; margin-bottom:20px; border-radius:10px;
            border:none; background:#0f172a; color:white; text-align:center;
        }
        .login-card button {
            background:#22c55e; color:white; border:none; padding:12px;
            border-radius:10px; font-weight:bold; cursor:pointer; width:100%;
        }
        
        /* Ocultar el panel por defecto */
        #panel-admin { display:none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>Rantiy Admin ⚡</h2>
            <input type="password" id="adminPass" placeholder="Introduce la Clave">
            <button onclick="verificarAcceso()">DESBLOQUEAR</button>
            <p id="error-txt" style="color:#ef4444; display:none; margin-top:10px; font-size:12px;">Clave Incorrecta</p>
        </div>
    </div>

    <div id="panel-admin">
        <h1 style="color:white; padding:20px;">Acceso Correcto. Bienvenido, Fundador.</h1>
        <p style="color:gray; padding-left:20px;">Cargando datos de Firebase...</p>
    </div>

    <script type="module">
        import { db, collection, onSnapshot } from "./firebase-engine.js";

        // Función para validar la entrada
        window.verificarAcceso = function() {
            const pass = document.getElementById('adminPass').value;
            // CAMBIA AQUÍ TU CLAVE SI QUIERES OTRA
            if (pass === "Rantiy2026") {
                localStorage.setItem('admin_session', 'ADMIN_SUPREMO');
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('panel-admin').style.display = 'block';
            } else {
                document.getElementById('error-txt').style.display = 'block';
            }
        }

        // Auto-login si ya entró antes
        if (localStorage.getItem('admin_session') === "ADMIN_SUPREMO") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('panel-admin').style.display = 'block';
        }
    </script>
</body>
</html>
