<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel R&R - Modo Dios</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Pantalla de bloqueo total */
        #bloqueo-seguridad {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .caja-login {
            background: #1e293b; padding: 30px; border-radius: 20px; border: 2px solid #22c55e;
            text-align: center; width: 90%; max-width: 320px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: none; background: #0f172a; color: white; text-align: center; font-size: 18px; }
        button { background: #22c55e; color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        
        /* El panel se oculta si no hay sesión */
        #panel-real { display: none; }
    </style>
</head>
<body>

    <div id="bloqueo-seguridad">
        <div class="caja-login">
            <h2 style="color: #22c55e; margin: 0;">Rantiy Control ⚡</h2>
            <p style="color: #94a3b8; font-size: 12px;">Acceso exclusivo para fundadores</p>
            <input type="password" id="claveMaestra" placeholder="••••••••">
            <button onclick="intentarEntrar()">DESBLOQUEAR PANEL</button>
            <p id="error" style="color: #ef4444; font-size: 12px; margin-top: 10px; display: none;">Clave incorrecta</p>
        </div>
    </div>

    <div id="panel-real">
        <h1 style="color: white; padding: 20px;">Bienvenido al Modo Dios, Jefe.</h1>
        </div>

    <script>
        // La clave es Rantiy2026 (ojo con la R mayúscula)
        function intentarEntrar() {
            const clave = document.getElementById('claveMaestra').value;
            if (clave === "Rantiy2026") {
                localStorage.setItem('admin_session', 'ADMIN_SUPREMO');
                document.getElementById('bloqueo-seguridad').style.display = 'none';
                document.getElementById('panel-real').style.display = 'block';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }

        // Si ya entró antes, saltar el login
        if (localStorage.getItem('admin_session') === "ADMIN_SUPREMO") {
            document.getElementById('bloqueo-seguridad').style.display = 'none';
            document.getElementById('panel-real').style.display = 'block';
        }
    </script>
</body>
</html>
