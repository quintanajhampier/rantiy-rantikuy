<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rantiy y Rantikuy - Mis Chats</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --emerald-light: #2ecc71;
            --emerald-mid: #27ae60;
            --emerald-deep: #1b5e20;
            --soft-sky: #e8f4f8;
            --white: #ffffff;
            --shadow-3d: 0 10px 30px rgba(0,0,0,0.08);
            --gradient-main: linear-gradient(135deg, var(--emerald-light), var(--emerald-deep));
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #f4f7f6; color: #1a2a21; height: 100vh; overflow: hidden; }

        header {
            background: var(--white); padding: 55px 20px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--emerald-mid);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }
        .app-name { font-size: 26px; font-weight: 900; color: var(--emerald-deep); letter-spacing: -1px; }
        .app-name span { color: var(--emerald-light); }

        .viewport { display: flex; width: 200%; height: 100vh; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen { width: 50%; height: 100%; padding: 20px; padding-bottom: 180px; overflow-y: auto; }

        .card-stock { background: var(--white); border-radius: 25px; margin-bottom: 20px; box-shadow: var(--shadow-3d); padding: 20px; border-top: 5px solid var(--emerald-mid); position: relative; }
        .card-stock h3 { color: var(--emerald-deep); font-size: 22px; margin-bottom: 10px; }
        .stock-tag { background: var(--soft-sky); color: var(--emerald-deep); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 800; text-transform: uppercase; }
        .stock-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stock-item { font-size: 14px; color: #666; }
        .stock-item b { color: #333; display: block; font-size: 16px; }
        .stock-note { margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ddd; font-style: italic; color: #555; font-size: 13px; }
        .prod-img-preview { width: 100%; height: 180px; object-fit: cover; border-radius: 15px; margin-top: 10px; background: #eee; }

        .btn-contactar { width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 12px; background: #1a2a21; color: white; font-weight: 900; cursor: pointer; }

        #chat-window { position: fixed; inset: 0; background: #e5ddd5; z-index: 5000; display: none; flex-direction: column; }
        .chat-nav { padding: 45px 15px 15px; background: var(--white); display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #ddd; }
        .btn-back { font-size: 40px; color: var(--emerald-mid); background: none; border: none; font-weight: bold; cursor: pointer; }
        
        .messages-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 15px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg-bubble.me { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 2px; }
        .msg-bubble.them { align-self: flex-start; background: var(--white); border-top-left-radius: 2px; }

        .chat-input-box { padding: 10px 10px 35px; background: #f0f0f0; display: flex; align-items: center; gap: 8px; }
        #m-input { flex: 1; border: none; background: var(--white); padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
        
        .btn-circle { width: 50px; height: 50px; border-radius: 50%; border: none; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .btn-mic { background: var(--emerald-deep); }
        .btn-mic.active { background: #ff3b30; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .btn-send { background: #0084ff; display: none; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 6000; display: none; align-items: flex-end; }
        .modal-sheet { background: var(--white); width: 100%; border-radius: 30px 30px 0 0; padding: 25px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 800; margin-bottom: 5px; font-size: 14px; color: var(--emerald-deep); }
        .input-p { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #eee; background: #fafafa; outline: none; font-size: 16px; }

        nav { position: fixed; bottom: 0; width: 100%; height: 90px; background: var(--white); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 4000; }
        .nav-icon { font-size: 28px; color: #ccc; transition: 0.3s; display: flex; flex-direction: column; align-items: center; cursor: pointer; text-decoration: none; }
        .nav-icon.active { color: var(--emerald-mid); }
        .nav-icon span { font-size: 10px; text-transform: uppercase; margin-top: 4px; color: #666; font-weight: bold;}
    </style>
</head>
<body>

<header>
    <div class="app-name">Rantiy y <span>Rantikuy</span></div>
    <div style="font-weight:900; background:var(--soft-sky); padding:5px 10px; border-radius:10px; font-size:12px; cursor:pointer;" onclick="window.location.href='index.html'">Volver a Vitrina</div>
</header>

<div class="viewport" id="vp">
    <div class="screen">
        <h2 style="font-weight:900; font-size:28px; margin-bottom:20px;">Mis Chats Activos</h2>
        <div id="list-contacts"></div>
    </div>

    <div class="screen">
        <h2 style="font-weight:900; font-size:28px; margin-bottom:20px;">Mi Almacén</h2>
        <button onclick="popProd()" style="background:var(--gradient-main); color:white; border:none; padding:18px; border-radius:20px; width:100%; font-weight:900; margin-bottom:25px; cursor:pointer;">+ REGISTRAR MERCADERÍA</button>
        <div id="list-inventory"></div>
    </div>
</div>

<div id="chat-window">
    <div class="chat-nav">
        <button class="btn-back" onclick="closeChat()">‹</button>
        <div id="active-av" style="width:45px; height:45px; background:var(--gradient-main); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:900; font-size:20px;">?</div>
        <div><b id="active-name" style="display:block; font-size:18px;">Nombre</b><span id="active-phone" style="font-size:12px; color:var(--emerald-mid);">Cargando...</span></div>
    </div>
    <div class="messages-area" id="m-flow"></div>
    <div class="chat-input-box">
        <button class="btn-circle" style="background:none; color:#666;" onclick="document.getElementById('u-file').click()">📎</button>
        <input type="file" id="u-file" hidden onchange="handleFile(this)">
        <input type="text" id="m-input" placeholder="Escribe un mensaje..." oninput="uiInput()">
        <button id="btn-mic" class="btn-circle btn-mic">🎤</button>
        <button id="btn-send" onclick="sendTxt()" class="btn-circle btn-send">➤</button>
    </div>
</div>

<nav>
    <a href="index.html" class="nav-icon" style="text-decoration: none;">🏠 <span>Vitrina</span></a>
    <div class="nav-icon active" onclick="go(0, this)">💬 <span>Chats</span></div>
    <div class="nav-icon" onclick="go(1, this)">📦 <span>Almacén</span></div>
</nav>

<div class="modal-overlay" id="modal" onclick="this.style.display='none'">
    <div class="modal-sheet" onclick="event.stopPropagation()" id="m-content"></div>
</div>

<script type="module">
    import { db, collection, addDoc, onSnapshot, query, where } from './firebase-engine.js';

    // 1. OBTENEMOS LA IDENTIDAD REAL DEL USUARIO
    const MI_NOMBRE = localStorage.getItem('rantiy_userName');
    const MI_TELEFONO = localStorage.getItem('rantiy_userPhone');

    if (!MI_NOMBRE || !MI_TELEFONO) {
        window.location.href = 'registro_entrada.html';
    }

    let localDB = JSON.parse(localStorage.getItem('RR_2026_STORE')) || { inventory: [] };
    let currentContact = null;
    let unsubscribeChat = null;
    let rec; let chunks = [];

    window.go = function(s, el) { 
        document.getElementById('vp').style.transform = `translateX(-${s * 50}%)`;
        document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    function saveContactLocally(phone, name) {
        let contacts = JSON.parse(localStorage.getItem('rantiy_contacts')) || [];
        if (!contacts.find(c => c.phone === phone)) {
            contacts.push({ phone, name });
            localStorage.setItem('rantiy_contacts', JSON.stringify(contacts));
            window.renderContacts(); 
        }
    }

    window.renderContacts = function() {
        let contacts = JSON.parse(localStorage.getItem('rantiy_contacts')) || [];
        const list = document.getElementById('list-contacts');
        
        if (contacts.length === 0) {
            list.innerHTML = `<div style="text-align:center; color:#888; margin-top:40px;">No tienes chats activos aún. Ve a la vitrina para contactar vendedores.</div>`;
        } else {
            list.innerHTML = contacts.map(c => `
                <div class="card-stock" onclick="openChat('${c.phone}', '${c.name}')" style="cursor:pointer; display:flex; align-items:center; gap:15px; padding:15px;">
                    <div style="width:50px; height:50px; background:var(--gradient-main); border-radius:50%; color:white; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:bold;">
                        ${c.name.charAt(0).toUpperCase()}
                    </div>
                    <div>
                        <h3 style="margin:0; font-size:18px;">${c.name}</h3>
                        <div style="color:#666; font-size:14px; margin-top:3px;">📱 ${c.phone}</div>
                    </div>
                </div>
            `).join('');
        }
    }

    window.openChat = function(phone, name) {
        if(phone === MI_TELEFONO) {
            alert("No puedes chatear contigo mismo.");
            return;
        }

        saveContactLocally(phone, name);
        currentContact = { phone, name };
        
        document.getElementById('active-name').innerText = name;
        document.getElementById('active-phone').innerText = phone;
        document.getElementById('active-av').innerText = name.charAt(0).toUpperCase();
        document.getElementById('chat-window').style.display = 'flex';
        
        const salaId = [MI_TELEFONO, phone].sort().join("___");

        if(unsubscribeChat) unsubscribeChat();
        
        const q = query(collection(db, "mensajes_privados"), where("sala", "==", salaId));
        
        unsubscribeChat = onSnapshot(q, (snapshot) => {
            let mensajesArr = [];
            
            snapshot.forEach((doc) => {
                mensajesArr.push(doc.data());
            });

            mensajesArr.sort((a, b) => a.timestamp - b.timestamp);

            let html = "";
            mensajesArr.forEach((m) => {
                const isMe = m.senderPhone === MI_TELEFONO;
                let content = m.v;
                if(m.t === 'img') content = `<img src="${m.v}" style="width:100%; border-radius:10px;">`;
                if(m.t === 'audio') content = `<audio controls src="${m.v}" style="width:200px; height: 40px;"></audio>`;
                
                html += `<div class="msg-bubble ${isMe?'me':'them'}">
                            ${content}
                            <div style="font-size:10px; opacity:0.5; text-align:right; margin-top:4px;">${m.time}</div>
                         </div>`;
            });
            const flow = document.getElementById('m-flow');
            flow.innerHTML = html;
            flow.scrollTop = flow.scrollHeight; 
        }, (error) => {
            console.error("Error al escuchar los mensajes:", error);
        });
    };

    window.closeChat = () => {
        document.getElementById('chat-window').style.display = 'none';
        if(unsubscribeChat) unsubscribeChat();
        currentContact = null;
    };

    window.sendTxt = async () => {
        const input = document.getElementById('m-input');
        const txt = input.value.trim();
        if(!txt || !currentContact) return;
        
        const salaId = [MI_TELEFONO, currentContact.phone].sort().join("___");
        
        const textoEnviado = txt;
        input.value = ""; window.uiInput();

        try {
            await addDoc(collection(db, "mensajes_privados"), {
                sala: salaId, 
                senderName: MI_NOMBRE, 
                senderPhone: MI_TELEFONO, 
                t: 'txt', 
                v: textoEnviado, 
                timestamp: Date.now(),
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
            });
        } catch (error) {
            console.error("Error al enviar el mensaje:", error);
            input.value = textoEnviado; 
            window.uiInput();
            alert("Hubo un error al enviar. Revisa tu conexión a Firebase.");
        }
    };

    window.uiInput = () => {
        const hasT = document.getElementById('m-input').value.length > 0;
        document.getElementById('btn-send').style.display = hasT ? 'flex' : 'none';
        document.getElementById('btn-mic').style.display = hasT ? 'none' : 'flex';
    };

    // --- MANEJO DE ARCHIVOS Y COMPRESIÓN DE IMÁGENES ---
    window.handleFile = (el) => {
        const file = el.files[0]; 
        if(!file) return;

        // Validar que sea una imagen
        if(!file.type.startsWith('image/')) {
            alert('Por favor, selecciona solo imágenes.');
            return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = async () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                
                const MAX_SIZE = 800;
                if (width > height) {
                    if (width > MAX_SIZE) {
                        height *= MAX_SIZE / width;
                        width = MAX_SIZE;
                    }
                } else {
                    if (height > MAX_SIZE) {
                        width *= MAX_SIZE / height;
                        height = MAX_SIZE;
                    }
                }
                
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                
                const salaId = [MI_TELEFONO, currentContact.phone].sort().join("___");
                
                try {
                    await addDoc(collection(db, "mensajes_privados"), {
                        sala: salaId, 
                        senderName: MI_NOMBRE, 
                        senderPhone: MI_TELEFONO, 
                        t: 'img', 
                        v: compressedBase64,
                        timestamp: Date.now(), 
                        time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
                    });
                } catch(error) {
                    console.error("Error al enviar la foto:", error);
                    alert("No se pudo enviar la foto. Intenta con una imagen más pequeña.");
                }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    };

    const micBtn = document.getElementById('btn-mic');
    micBtn.onpointerdown = async (e) => {
        e.preventDefault();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            rec = new MediaRecorder(stream); chunks = [];
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = async () => {
                const blob = new Blob(chunks, { type: 'audio/ogg' });
                const reader = new FileReader();
                reader.onload = async () => {
                    const salaId = [MI_TELEFONO, currentContact.phone].sort().join("___");
                    await addDoc(collection(db, "mensajes_privados"), {
                        sala: salaId, senderName: MI_NOMBRE, senderPhone: MI_TELEFONO, t: 'audio', v: reader.result,
                        timestamp: Date.now(), time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
                    });
                };
                reader.readAsDataURL(blob);
            };
            rec.start(); micBtn.classList.add('active');
        } catch(err) {
            alert("Necesitas dar permisos de micrófono para enviar audios.");
        }
    };
    micBtn.onpointerup = () => { if(rec) { rec.stop(); micBtn.classList.remove('active'); } };
    micBtn.onpointerleave = () => { if(rec && rec.state === "recording") { rec.stop(); micBtn.classList.remove('active'); } };

    // --- GESTIÓN DE ALMACÉN ---
    window.popProd = () => {
        document.getElementById('m-content').innerHTML = `
            <h2 style="margin-bottom:15px;">Nuevo Producto</h2>
            <div class="form-group"><label>Nombre</label><input id="p-n" class="input-p"></div>
            <div class="form-group"><label>Precio S/</label><input id="p-p" class="input-p" type="number"></div>
            <div class="form-group"><label>Teléfono del Vendedor</label><input id="p-tel" class="input-p" type="tel" value="${MI_TELEFONO}" readonly style="opacity:0.7"></div>
            <div class="form-group"><label>Foto URL (o base64)</label><input id="p-img" class="input-p" placeholder="Opcional"></div>
            <button onclick="addP()" style="width:100%; padding:15px; background:var(--gradient-main); color:white; border:none; border-radius:12px; font-weight:bold;">GUARDAR EN ALMACÉN</button>
        `;
        document.getElementById('modal').style.display = 'flex';
    };

    window.addP = () => {
        const prod = {
            id: Date.now(),
            name: document.getElementById('p-n').value,
            price: document.getElementById('p-p').value,
            sellerPhone: MI_TELEFONO,
            img: document.getElementById('p-img').value || 'https://via.placeholder.com/150'
        };
        localDB.inventory.push(prod);
        localStorage.setItem('RR_2026_STORE', JSON.stringify(localDB));
        document.getElementById('modal').style.display = 'none';
        window.render();
    };

    window.render = () => {
        const inv = document.getElementById('list-inventory');
        if(localDB.inventory.length === 0) {
            inv.innerHTML = `<p style="text-align:center; color:#888;">Tu almacén está vacío.</p>`;
            return;
        }
        inv.innerHTML = localDB.inventory.map(p => `
            <div class="card-stock">
                <img src="${p.img}" class="prod-img-preview">
                <h3 style="margin-top:10px;">${p.name}</h3>
                <div class="stock-item">Precio: <b>S/ ${p.price}</b></div>
            </div>
        `).join('');
    };

    // --- ARRANQUE DE LA APP ---
    window.onload = () => {
        window.render(); 
        window.renderContacts(); 

        const urlParams = new URLSearchParams(window.location.search);
        const urlName = urlParams.get('name');
        const urlPhone = urlParams.get('phone');

        if (urlName && urlPhone) {
            openChat(urlPhone, urlName);
            window.history.replaceState({}, document.title, "chat_privado.html");
        }
        
        document.getElementById('m-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') window.sendTxt();
        });
    };
</script>
</body>
</html>
