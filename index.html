<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rantiy-Rantikuy | Enterprise</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --rr-neon: #00f59b;
            --rr-bg: #050a14;
            --rr-surface: #0f172a;
            --rr-text: #f8fafc;
            --rr-text-dim: #94a3b8;
            --rr-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--rr-bg); color: var(--rr-text); height: 100vh; overflow: hidden; }

        /* CAPAS CRÍTICAS */
        .system-layer {
            position: fixed; inset: 0; display: none; 
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 9000; background: var(--rr-bg); padding: 25px; text-align: center;
        }

        .active-layer { display: flex !important; }

        .glass-panel {
            background: var(--rr-surface); border: 1px solid var(--rr-border);
            border-radius: 32px; padding: 30px; width: 100%; max-width: 400px;
        }

        .rr-field {
            width: 100%; background: #0b1120; border: 2px solid #1e293b;
            padding: 16px; border-radius: 18px; color: white; margin-bottom: 15px; font-size: 16px;
        }

        .rr-btn-primary {
            width: 100%; background: var(--rr-neon); color: var(--rr-bg);
            padding: 18px; border-radius: 20px; border: none; font-weight: 800;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* NAVEGACIÓN Y APP */
        #app-shell { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: opacity 0.5s; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--rr-border); }
        .viewport { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; scroll-behavior: smooth; }

        .dock {
            position: fixed; bottom: 15px; left: 15px; right: 15px;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            border-radius: 25px; height: 75px; display: flex; justify-content: space-around;
            align-items: center; border: 1px solid var(--rr-border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-link { background: none; border: none; color: var(--rr-text-dim); font-size: 10px; font-weight: 700; transition: 0.3s; }
        .nav-link i { font-size: 20px; margin-bottom: 4px; display: block; }
        .nav-link.active { color: var(--rr-neon); transform: translateY(-5px); }

        /* FEED DE PRODUCTOS */
        .product-card {
            background: var(--rr-surface); border-radius: 24px; overflow: hidden;
            margin-bottom: 20px; border: 1px solid var(--rr-border); animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #emergency-reset { position: fixed; bottom: 2px; right: 2px; opacity: 0.2; font-size: 8px; color: white; z-index: 10000; cursor: pointer; }
    </style>
</head>
<body>

    <div id="emergency-reset" onclick="localStorage.clear(); location.reload();">RESETEAR CACHE</div>

    <div id="layer-auth" class="system-layer">
        <div class="glass-panel">
            <div style="font-size: 40px; color: var(--rr-neon); margin-bottom: 15px;"><i class="fas fa-rocket"></i></div>
            <h2 style="margin-bottom: 5px;">Rantiy-Rantikuy</h2>
            <p style="color: var(--rr-text-dim); margin-bottom: 25px;">Tu negocio digital empieza aquí</p>
            <input type="text" id="auth-name" class="rr-field" placeholder="Nombre de tu tienda">
            <input type="number" id="auth-phone" class="rr-field" placeholder="WhatsApp (9 dígitos)">
            <button class="rr-btn-primary" onclick="engine.executeAuth()">INICIAR SISTEMA</button>
        </div>
    </div>

    <div id="layer-gps" class="system-layer">
        <div class="fa-3x" style="color: var(--rr-neon); margin-bottom: 20px;">
            <i class="fas fa-circle-notch fa-spin"></i>
        </div>
        <h2 id="gps-title">Sincronizando GPS...</h2>
        <p id="gps-status" style="color: var(--rr-text-dim); margin-top: 10px;">Buscando la mejor zona para vender</p>
    </div>

    <div id="app-shell">
        <header>
            <div style="display:flex; align-items:center; gap:12px;">
                <div style="width:35px; height:35px; background:var(--rr-neon); border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--rr-bg); font-weight:900;">R</div>
                <div>
                    <div id="ui-city" style="font-weight:800; font-size: 14px; letter-spacing: 0.5px;">CARGANDO...</div>
                    <div style="font-size:8px; color:var(--rr-neon); font-weight: 700;">NETWORK ONLINE</div>
                </div>
            </div>
            <div id="ui-avatar" onclick="location.href='perfil.html'" style="width: 35px; height: 35px; border-radius: 50%; background: #1e293b; display: flex; align-items: center; justify-content: center; border: 1px solid var(--rr-neon);">
                <i class="fas fa-user" style="font-size: 14px; color: var(--rr-neon);"></i>
            </div>
        </header>

        <main class="viewport">
            <section id="view-home" class="app-view">
                <div id="render-feed" style="display:grid; gap:15px;">
                    </div>
            </section>

            <section id="view-sell" class="app-view" style="display:none;">
                <div class="glass-panel" style="max-width:100%; text-align:left;">
                    <h3 style="margin-bottom:20px;">Nueva Publicación</h3>
                    <label style="font-size: 12px; color: var(--rr-text-dim);">Imagen del producto</label>
                    <input type="file" id="in-file" accept="image/*" class="rr-field" onchange="engine.processMedia(this)">
                    <input type="text" id="sell-title" class="rr-field" placeholder="¿Qué estás vendiendo?">
                    <input type="number" id="sell-price" class="rr-field" placeholder="Precio en S/">
                    <button class="rr-btn-primary" onclick="engine.deployProduct()">SUBIR A LA VITRINA</button>
                </div>
            </section>

            <section id="view-chat" class="app-view" style="display:none;">
                <div id="feed-global" style="display:flex; flex-direction:column; gap:12px; margin-bottom:20px; min-height: 200px;"></div>
                <div style="display:flex; gap:10px; position: sticky; bottom: 0; background: var(--rr-bg); padding: 10px 0;">
                    <input type="text" id="msg-input" class="rr-field" style="margin:0;" placeholder="Escribe a la ciudad...">
                    <button class="rr-btn-primary" style="width:60px;" onclick="engine.broadcast()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </section>
        </main>

        <nav class="dock">
            <button class="nav-link active" onclick="engine.route('home', this)"><i class="fas fa-th-large"></i>VITRINA</button>
            <button class="nav-link" onclick="engine.route('sell', this)"><i class="fas fa-camera"></i>VENDER</button>
            <button class="nav-link" onclick="engine.route('chat', this)"><i class="fas fa-globe"></i>CIUDAD</button>
            <button class="nav-link" onclick="location.href='chat_privado.html'"><i class="fas fa-comment-dots"></i>CHATS</button>
        </nav>
    </div>

    <script>
        window.engine = {
            profile: JSON.parse(localStorage.getItem('rr_user_session')),
            city: "HUANCAYO",
            currentImg: "",
            fb: { conectarVitrina: null, subirProducto: null, conectarChat: null, enviarChat: null },

            init: function() {
                if(!this.profile) {
                    this.showLayer('auth');
                } else {
                    this.syncGPS();
                }
            },

            showLayer: function(id) {
                document.querySelectorAll('.system-layer').forEach(l => l.classList.remove('active-layer'));
                document.getElementById('layer-'+id).classList.add('active-layer');
            },

            executeAuth: function() {
                const n = document.getElementById('auth-name').value;
                const p = document.getElementById('auth-phone').value;
                if(n.length < 3 || p.length < 9) {
                    return Swal.fire("Error", "Ingresa un nombre y un celular válido", "error");
                }
                this.profile = { uid: "ID-"+Date.now(), name: n, phone: p };
                localStorage.setItem('rr_user_session', JSON.stringify(this.profile));
                location.reload();
            },

            syncGPS: function() {
                this.showLayer('gps');
                
                // --- SOLUCIÓN AL BLOQUEO: TIMEOUT DE 5 SEGUNDOS ---
                const gpsTimeout = setTimeout(() => {
                    console.warn("GPS tardó demasiado, usando Huancayo por defecto");
                    this.startApp();
                }, 5000);

                navigator.geolocation.getCurrentPosition(async (pos) => {
                    clearTimeout(gpsTimeout);
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                        const data = await res.json();
                        this.city = (data.address.county || data.address.city || "HUANCAYO").toUpperCase();
                    } catch(e) { console.error("Error Nominatim", e); }
                    this.startApp();
                }, (err) => {
                    clearTimeout(gpsTimeout);
                    console.error("GPS Denegado o Error", err);
                    this.startApp();
                }, { timeout: 4000 });
            },

            startApp: function() {
                document.querySelectorAll('.system-layer').forEach(l => l.style.display='none');
                const shell = document.getElementById('app-shell');
                shell.style.display = 'flex';
                setTimeout(() => shell.style.opacity = '1', 50);
                document.getElementById('ui-city').innerText = this.city;
                
                // Esperar carga de Firebase con máximo de 10 intentos
                let attempts = 0;
                const checkFB = setInterval(() => {
                    attempts++;
                    if(this.fb.conectarVitrina) {
                        this.bindFirebase();
                        clearInterval(checkFB);
                    }
                    if(attempts > 20) {
                        clearInterval(checkFB);
                        Swal.fire("Error de Conexión", "Firebase no cargó correctamente", "warning");
                    }
                }, 500);
            },

            bindFirebase: function() {
                this.fb.conectarVitrina(this.city, (items) => {
                    const feed = document.getElementById('render-feed');
                    if(items.length === 0) {
                        feed.innerHTML = `<div style="text-align:center; padding:40px; color:var(--rr-text-dim);">Aún no hay productos en ${this.city}. ¡Sé el primero!</div>`;
                        return;
                    }
                    feed.innerHTML = items.map(p => `
                        <div class="product-card">
                            <img src="${p.img}" style="width:100%; height:280px; object-fit:cover;" loading="lazy">
                            <div style="padding:15px;">
                                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                                    <div>
                                        <h3 style="font-size:16px; margin-bottom:4px;">${p.title}</h3>
                                        <span style="font-size:10px; color:var(--rr-neon); font-weight:700;"><i class="fas fa-store"></i> ${p.nombre || 'Vendedor'}</span>
                                    </div>
                                    <b style="color:var(--rr-neon); font-size:18px;">S/ ${p.price}</b>
                                </div>
                                <button class="rr-btn-primary" style="margin-top:15px; height:45px; font-size:14px;" 
                                    onclick="location.href='chat_privado.html?target=${p.uid}&prod=${encodeURIComponent(p.title)}&phone=${p.phone}'">
                                    <i class="fab fa-whatsapp"></i> COMPRAR AHORA
                                </button>
                            </div>
                        </div>
                    `).join('');
                });

                this.fb.conectarChat(this.city, (msgs) => {
                    const box = document.getElementById('feed-global');
                    box.innerHTML = msgs.map(m => `
                        <div style="background:${m.uid === this.profile.uid ? 'var(--rr-neon)' : 'var(--rr-surface)'}; 
                                    color:${m.uid === this.profile.uid ? 'black' : 'white'};
                                    padding:12px; border-radius:18px; align-self:${m.uid === this.profile.uid ? 'flex-end' : 'flex-start'}; 
                                    max-width:85%; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
                            <small style="font-size:9px; display:block; margin-bottom:4px; opacity:0.7; font-weight:800;">${m.nombre.toUpperCase()}</small>
                            <span style="font-size:14px;">${m.txt}</span>
                        </div>
                    `).join('');
                    box.scrollTop = box.scrollHeight;
                });
            },

            route: function(id, btn) {
                document.querySelectorAll('.app-view').forEach(v => v.style.display = 'none');
                document.getElementById('view-'+id).style.display = 'block';
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                btn.classList.add('active');
            },

            processMedia: function(input) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (e) => { this.currentImg = e.target.result; };
                    reader.readAsDataURL(input.files[0]);
                }
            },

            deployProduct: async function() {
                const t = document.getElementById('sell-title').value;
                const p = document.getElementById('sell-price').value;
                if(!t || !p || !this.currentImg) return Swal.fire("Atención", "Completa todos los campos y sube una foto", "info");
                
                Swal.showLoading();
                try {
                    await this.fb.subirProducto(this.profile, { title: t, price: p, img: this.currentImg }, this.city);
                    Swal.fire({ title: "¡Éxito!", text: "Tu producto ya está en la vitrina", icon: "success", timer: 2000 });
                    this.route('home', document.querySelector('.nav-link'));
                    // Limpiar campos
                    document.getElementById('sell-title').value = "";
                    document.getElementById('sell-price').value = "";
                    this.currentImg = "";
                } catch(e) {
                    Swal.fire("Error", "No se pudo publicar", "error");
                }
            },

            broadcast: function() {
                const input = document.getElementById('msg-input');
                if(!input.value.trim()) return;
                this.fb.enviarChat(this.profile, input.value, this.city);
                input.value = "";
            }
        };

        window.onload = () => engine.init();
    </script>

    <script type="module">
        import { 
            conectarChatGrupal, enviarMensajeGrupal, 
            conectarVitrina, subirProducto 
        } from './firebase-engine.js';

        window.engine.fb.conectarVitrina = conectarVitrina;
        window.engine.fb.subirProducto = subirProducto;
        window.engine.fb.conectarChat = conectarChatGrupal;
        window.engine.fb.enviarChat = enviarMensajeGrupal;
    </script>
</body>
</html>
