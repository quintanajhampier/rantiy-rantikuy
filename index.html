<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rantiy-Rantikuy OS | Módulo Principal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --rr-brand: #00f59b;
            --rr-deep: #050a14;
            --rr-accent: #7d33ff;
            --glass: rgba(10, 15, 30, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #0b0f1a; color: #e2e8f0; overflow-x: hidden; padding-bottom: 120px; }

        /* --- PANTALLA GPS Y CARGA --- */
        #splash-gps {
            position: fixed; inset: 0; background: #ffffff; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;
        }
        .logo-gps { width: 120px; height: 120px; background: #00d084; border-radius: 35px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 36px; margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0, 208, 132, 0.3); }
        .gps-status { color: #64748b; font-size: 15px; font-weight: 600; margin-top: 15px; }
        .gps-error { color: #ef4444; font-weight: 800; margin-top: 20px; font-size: 16px; display: none; }

        /* --- HEADER PROFESIONAL --- */
        header {
            background: rgba(10, 15, 26, 0.9); backdrop-filter: blur(15px);
            padding: 20px; position: sticky; top: 0; z-index: 2000;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .main-brand { display: flex; align-items: center; gap: 15px; }
        .logo-rr { width: 50px; height: 50px; background: var(--rr-brand); border-radius: 15px; display: flex; align-items: center; justify-content: center; color: var(--rr-deep); font-weight: 900; font-size: 22px; cursor: pointer; }
        
        .user-hub { display: flex; align-items: center; gap: 12px; }
        .wallet-neon {
            background: #1a2235; border: 1px solid var(--rr-brand); padding: 8px 15px; border-radius: 14px;
            font-size: 13px; font-weight: 800; color: var(--rr-brand); display: flex; align-items: center; gap: 8px; cursor: pointer;
        }

        /* --- SELECTOR DE PROVINCIAS --- */
        .location-bar { padding: 15px; display: flex; gap: 10px; flex-direction: column; background: #0b0f1a; }
        .dept-select { background: #1a2235; color: white; padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); font-weight: 700; outline: none; }
        .city-slider { display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; padding-bottom: 5px; }
        .city-slider::-webkit-scrollbar { display: none; }
        .city-box { padding: 10px 20px; background: #161c2d; border-radius: 15px; white-space: nowrap; font-size: 12px; font-weight: 700; color: #64748b; transition: 0.3s; cursor: pointer; }
        .city-box.active { background: var(--rr-brand); color: var(--rr-deep); }

        /* --- VITRINA (POSTS) --- */
        .feed-container { padding: 20px; display: grid; grid-template-columns: 1fr; gap: 25px; }
        .rr-card { background: #1a2235; border-radius: 35px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; }
        .media-holder { width: 100%; height: 320px; background: #050a14; position: relative; }
        .media-holder img { width: 100%; height: 100%; object-fit: cover; }
        .price-tag { position: absolute; bottom: 20px; left: 20px; background: var(--rr-brand); color: var(--rr-deep); padding: 12px 25px; border-radius: 20px; font-weight: 900; font-size: 22px; }
        .card-body { padding: 25px; }
        .btn-rr { flex: 1; padding: 18px; border-radius: 22px; border: none; font-weight: 800; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; width: 100%; margin-top:10px; }
        .btn-chat-privado { background: var(--rr-accent); color: white; }
        .btn-sold { background: var(--rr-brand); color: var(--rr-deep); }

        /* --- CHAT PÚBLICO --- */
        .chat-space { height: calc(100vh - 270px); display: flex; flex-direction: column; padding: 15px; }
        .chat-main { flex: 1; background: #161c2d; border-radius: 35px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05); }
        .chat-scroll { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .chat-bubble { padding: 15px 22px; border-radius: 25px; font-size: 14px; max-width: 85%; }
        .bubble-me { background: var(--rr-brand); color: var(--rr-deep); align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-other { background: #232d45; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-tools { padding: 20px; background: #1a2235; display: flex; gap: 10px; }
        .chat-in { flex: 1; background: #0b0f1a; border: 1px solid rgba(255,255,255,0.1); padding: 16px 20px; border-radius: 20px; color: white; font-weight: 600; width: 100%; }

        /* --- DOCK NAVEGACIÓN --- */
        .dock { position: fixed; bottom: 30px; left: 20px; right: 20px; background: rgba(26, 34, 53, 0.95); backdrop-filter: blur(20px); border-radius: 35px; padding: 15px; display: flex; justify-content: space-around; z-index: 4000; border: 1px solid rgba(255,255,255,0.05); }
        .dock-link { color: #64748b; font-size: 10px; font-weight: 800; background: none; border: none; transition: 0.3s; display:flex; flex-direction:column; align-items:center; }
        .dock-link.active { color: var(--rr-brand); transform: translateY(-5px); }
        .dock-link i { font-size: 24px; margin-bottom: 5px; }

        /* --- MODALES --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1a2235; width: 100%; max-width: 450px; border-radius: 40px; padding: 30px; }
        .upload-preview { width: 100%; height: 200px; border-radius: 20px; object-fit: cover; margin-bottom: 20px; display: none; border: 2px solid var(--rr-brand); }
    </style>
</head>
<body>

<div id="splash-gps">
    <div class="logo-gps">R&R</div>
    <h1 style="color:#0a0f18; font-weight:900; font-size:28px;">Rantiy y Rantikuy</h1>
    <p class="gps-status" id="gps-text">Detectando tu ubicación real en el mapa...</p>
    <p class="gps-error" id="gps-error">FUERA DE COBERTURA: Provincia no detectada.</p>
    <button id="btn-manual-gps" onclick="cerrarSplashGps()" style="display:none; margin-top:20px; padding:15px 30px; background:#0a0f18; color:white; border:none; border-radius:20px; font-weight:800;">Elegir Manualmente</button>
</div>

<div id="modal-yape" class="modal">
    <div class="modal-content">
        <h2 style="font-weight:900; font-size:24px; margin-bottom:10px;">💳 Recarga Rantiy</h2>
        <div style="background:#0b0f1a; padding:20px; border-radius:25px; text-align:center; margin-bottom:20px;">
            <p style="font-weight:800; color:var(--rr-brand); margin-bottom:10px;">YAPEA AL: 901198050</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=901198050" style="width:130px; border-radius:15px; border: 3px solid white;">
        </div>
        <input type="number" id="yape-op-code" class="chat-in" style="margin-bottom:15px;" placeholder="Cód. Operación">
        <button class="btn-rr btn-sold" onclick="reportYape()">CONFIRMAR</button>
        <button onclick="closeModal('modal-yape')" style="width:100%; background:none; border:none; color:#64748b; margin-top:15px; font-weight:800;">Cerrar</button>
    </div>
</div>

<header>
    <div class="main-brand">
        <div class="logo-rr" onclick="hitAdmin()">R&R</div>
        <div>
            <h1 id="top-provincia" style="font-size:16px; font-weight:800;">...</h1>
            <span style="font-size:10px; font-weight:800; color:var(--rr-brand);">GPS ACTIVO</span>
        </div>
    </div>
    <div class="user-hub">
        <div class="wallet-neon" onclick="openModal('modal-yape')">
            <i class="fas fa-bolt"></i> <span id="my-credits">0</span> CR
        </div>
    </div>
</header>

<div class="location-bar">
    <select id="dept-selector" class="dept-select" onchange="renderProvincias(this.value)"></select>
    <div class="city-slider" id="city-bar"></div>
</div>

<main id="page-home" class="view">
    <div class="feed-container" id="main-vitrina"></div>
</main>

<section id="page-sell" class="view" style="display:none; padding:20px;">
    <div style="background:#1a2235; padding:30px; border-radius:35px;">
        <h2 style="font-weight:900; margin-bottom:20px;">Vender Algo</h2>
        <input type="file" id="file-sell" hidden accept="image/*,video/*" onchange="previewMedia(this, 'preview-sell')">
        <div onclick="document.getElementById('file-sell').click()" id="drop-area" style="width:100%; height:200px; border:3px dashed #232d45; border-radius:25px; display:flex; flex-direction:column; align-items:center; justify-content:center; margin-bottom:20px; background:#0b0f1a; cursor:pointer;">
            <img id="preview-sell" class="upload-preview">
            <div id="upload-txt"><i class="fas fa-camera" style="font-size:30px; color:var(--rr-brand); margin-bottom:10px;"></i><p>Foto / Galería</p></div>
        </div>
        <input type="text" id="sell-title" class="chat-in" style="margin-bottom:15px;" placeholder="Título del producto">
        <input type="number" id="sell-price" class="chat-in" style="margin-bottom:20px;" placeholder="Precio S/">
        <button class="btn-rr btn-sold" onclick="deployProduct()">PUBLICAR EN LA VITRINA</button>
    </div>
</section>

<section id="page-chat" class="view" style="display:none;">
    <div class="chat-space">
        <div class="chat-main">
            <div style="padding:15px; background:#0b0f1a; font-weight:800; font-size:12px;">GRUPO PÚBLICO: <span id="chat-city">...</span></div>
            <div class="chat-scroll" id="chat-box"></div>
            <div class="chat-tools">
                <input type="text" id="chat-input" class="chat-in" placeholder="Mensaje público...">
                <button class="btn-rr btn-sold" style="width:60px; padding:0;" onclick="sendGroupMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</section>

<nav class="dock">
    <button class="dock-link active" onclick="nav('home', this)"><i class="fas fa-store"></i>VITRINA</button>
    <button class="dock-link" onclick="nav('sell', this)"><i class="fas fa-plus-circle"></i>VENDER</button>
    <button class="dock-link" onclick="nav('chat', this)"><i class="fas fa-users"></i>COMUNIDAD</button>
    <button class="dock-link" onclick="irChatPrivado()"><i class="fas fa-envelope"></i>PRIVADOS</button>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, serverTimestamp, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDYF0A8d5pyS-HpbqAADi-TTu_BeRoG3jw",
        authDomain: "rantiy-y-rantikuy.firebaseapp.com",
        projectId: "rantiy-y-rantikuy",
        storageBucket: "rantiy-y-rantikuy.firebasestorage.app",
        messagingSenderId: "49676513708",
        appId: "1:49676513708:web:943ad781c98cb7bac78a09"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;
    window.f = { collection, addDoc, onSnapshot, query, orderBy, where, serverTimestamp, doc, updateDoc, increment };

    // Sincronización de Billetera
    window.syncWallet = (uid) => {
        onSnapshot(doc(db, "v4_users", uid), (snap) => {
            if(snap.exists()){
                window.currentUser = snap.data();
                document.getElementById('my-credits').innerText = window.currentUser.credits || 0;
            } else {
                addDoc(collection(db, "v4_users"), { uid, credits: 0 });
            }
        });
    };
</script>

<script>
    // --- 1. SEGURIDAD Y ENRUTAMIENTO (AUTH GUARD) ---
    // Simulamos verificación. Si tu registro_entrada.html guarda un item en localStorage, lo leemos aquí.
    let miSession = localStorage.getItem('rr_usuario_registrado');
    if(!miSession) {
        // Descomenta la siguiente línea en producción para forzar el login
        // window.location.href = 'registro_entrada.html';
        miSession = "U-" + Math.random().toString(36).substr(2, 9); // Fallback temporal
        localStorage.setItem('rr_usuario_registrado', miSession);
    }
    
    // --- 2. BASE DE DATOS GEOGRÁFICA (196 PROVINCIAS) ---
    const DB_PERU = {
        "Amazonas": ["Chachapoyas", "Bagua", "Bongará", "Condorcanqui", "Luya", "Rodríguez de Mendoza", "Utcubamba"],
        "Áncash": ["Huaraz", "Aija", "Antonio Raymondi", "Asunción", "Bolognesi", "Carhuaz", "Carlos Fermín Fitzcarrald", "Casma", "Corongo", "Huari", "Huarmey", "Huaylas", "Mariscal Luzuriaga", "Ocros", "Pallasca", "Pomabamba", "Recuay", "Santa", "Sihuas", "Yungay"],
        "Apurímac": ["Abancay", "Andahuaylas", "Antabamba", "Aymaraes", "Cotabambas", "Chincheros", "Grau"],
        "Arequipa": ["Arequipa", "Camaná", "Caravelí", "Castilla", "Caylloma", "Condesuyos", "Islay", "La Unión"],
        "Ayacucho": ["Huamanga", "Cangallo", "Huanca Sancos", "Huanta", "La Mar", "Lucanas", "Parinacochas", "Paucar del Sara Sara", "Sucre", "Víctor Fajardo", "Vilcas Huamán"],
        "Cajamarca": ["Cajamarca", "Cajabamba", "Celendín", "Chota", "Contumazá", "Cutervo", "Hualgayoc", "Jaén", "San Ignacio", "San Marcos", "San Miguel", "San Pablo", "Santa Cruz"],
        "Cusco": ["Cusco", "Acomayo", "Anta", "Calca", "Canas", "Canchis", "Chumbivilcas", "Espinar", "La Convención", "Paruro", "Paucartambo", "Quispicanchi", "Urubamba"],
        "Huancavelica": ["Huancavelica", "Acobamba", "Angaraes", "Castrovirreyna", "Churcampa", "Huaytará", "Tayacaja"],
        "Huánuco": ["Huánuco", "Ambo", "Dos de Mayo", "Huacaybamba", "Huamalíes", "Leoncio Prado", "Marañón", "Pachitea", "Puerto Inca", "Lauricocha", "Yarowilca"],
        "Ica": ["Ica", "Chincha", "Nazca", "Palpa", "Pisco"],
        "Junín": ["Huancayo", "Concepción", "Chanchamayo", "Jauja", "Junín", "Satipo", "Tarma", "Yauli", "Chupaca"],
        "La Libertad": ["Trujillo", "Ascope", "Bolívar", "Chepén", "Julcán", "Otuzco", "Pacasmayo", "Pataz", "Sánchez Carrión", "Santiago de Chuco", "Gran Chimú", "Virú"],
        "Lambayeque": ["Chiclayo", "Ferreñafe", "Lambayeque"],
        "Lima": ["Barranca", "Cajatambo", "Canta", "Cañete", "Huaral", "Huarochirí", "Huaura", "Oyón", "Yauyos", "Lima"],
        "Callao": ["Callao"],
        "Loreto": ["Maynas", "Alto Amazonas", "Loreto", "Mariscal Ramón Castilla", "Requena", "Ucayali", "Datem del Marañón", "Putumayo"],
        "Madre de Dios": ["Tambopata", "Manu", "Tahuamanu"],
        "Moquegua": ["Mariscal Nieto", "General Sánchez Cerro", "Ilo"],
        "Pasco": ["Pasco", "Daniel Alcides Carrión", "Oxapampa"],
        "Piura": ["Piura", "Ayabaca", "Huancabamba", "Morropón", "Paita", "Sullana", "Talara", "Sechura"],
        "Puno": ["Puno", "Azángaro", "Carabaya", "Chucuito", "El Collao", "Huancané", "Lampa", "Melgar", "Moho", "San Antonio de Putina", "San Román", "Sandia", "Yunguyo"],
        "San Martín": ["Moyobamba", "Bellavista", "El Dorado", "Huallaga", "Lamas", "Mariscal Cáceres", "Picota", "Rioja", "San Martín", "Tocache"],
        "Tacna": ["Tacna", "Candarave", "Jorge Basadre", "Tarata"],
        "Tumbes": ["Tumbes", "Contralmirante Villar", "Zarumilla"],
        "Ucayali": ["Coronel Portillo", "Atalaya", "Padre Abad", "Purús"]
    };

    let activeProvincia = "";
    let base64Temp = "";
    let adminClicks = 0;

    window.onload = () => {
        initSelects();
        detectarGPS();
        // Esperamos que firebase cargue
        setTimeout(() => { if(window.syncWallet) window.syncWallet(miSession); }, 1500);
    };

    // --- 3. MOTOR GPS INVERSO (OPENSTREETMAP NOMINATIM) ---
    function detectarGPS() {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const data = await res.json();
                    
                    // Extraer provincia/ciudad de la respuesta GPS
                    const loc = data.address.county || data.address.city || data.address.town || data.address.state;
                    
                    if(ubicarEnSistema(loc)) {
                        cerrarSplashGps();
                    } else {
                        throw new Error("No coincide con provincias de Perú.");
                    }
                } catch (error) {
                    mostrarErrorGps();
                }
            }, (err) => {
                mostrarErrorGps();
            });
        } else {
            mostrarErrorGps();
        }
    }

    function ubicarEnSistema(nombreGPS) {
        for (const [dept, provs] of Object.entries(DB_PERU)) {
            for (const prov of provs) {
                // Limpieza básica para match (ignorar tildes)
                if(nombreGPS.toLowerCase().includes(prov.toLowerCase())) {
                    document.getElementById('dept-selector').value = dept;
                    renderProvincias(dept);
                    setProvincia(prov);
                    return true;
                }
            }
        }
        return false;
    }

    function mostrarErrorGps() {
        document.getElementById('gps-text').style.display = 'none';
        document.getElementById('gps-error').style.display = 'block';
        document.getElementById('btn-manual-gps').style.display = 'inline-block';
    }

    function cerrarSplashGps() {
        document.getElementById('splash-gps').style.display = 'none';
        // Si no se ubicó nada, por defecto Huancayo
        if(!activeProvincia) {
            document.getElementById('dept-selector').value = "Junín";
            renderProvincias("Junín");
            setProvincia("Huancayo");
        }
    }

    // --- 4. RENDERIZADO DE DEPARTAMENTOS Y PROVINCIAS ---
    function initSelects() {
        const select = document.getElementById('dept-selector');
        for (const dept in DB_PERU) {
            const opt = document.createElement('option');
            opt.value = dept; opt.innerText = dept;
            select.appendChild(opt);
        }
    }

    function renderProvincias(dept) {
        const bar = document.getElementById('city-bar');
        bar.innerHTML = "";
        DB_PERU[dept].forEach(prov => {
            const b = document.createElement('div');
            b.className = `city-box`;
            b.id = `prov-${prov.replace(/\s+/g, '')}`;
            b.innerText = prov.toUpperCase();
            b.onclick = () => setProvincia(prov);
            bar.appendChild(b);
        });
    }

    function setProvincia(prov) {
        activeProvincia = prov;
        document.getElementById('top-provincia').innerText = prov;
        document.getElementById('chat-city').innerText = prov.toUpperCase();
        
        document.querySelectorAll('.city-box').forEach(x => x.classList.remove('active'));
        const activeBox = document.getElementById(`prov-${prov.replace(/\s+/g, '')}`);
        if(activeBox) activeBox.classList.add('active');
        
        loadVitrina();
        loadChat();
    }

    // --- 5. ENRUTAMIENTO A TUS ARCHIVOS EXTERNOS ---
    function hitAdmin() {
        adminClicks++;
        if(adminClicks >= 10) {
            // REDIRECCIÓN DIRECTA A TU PANEL DE ADMIN EXISTENTE
            window.location.href = 'admin.html';
        }
    }

    function irChatPrivado(uidVendedor = null) {
        // ENLACE A TU ARCHIVO DE CHAT PRIVADO
        if(uidVendedor) {
            window.location.href = `chat_privado.html?chat_con=${uidVendedor}`;
        } else {
            window.location.href = `chat_privado.html`;
        }
    }

    // --- 6. CORE DE NEGOCIO (VITRINA Y MULTIMEDIA) ---
    function previewMedia(input, previewId) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const prev = document.getElementById(previewId);
            prev.src = e.target.result;
            prev.style.display = 'block';
            document.getElementById('upload-txt').style.display = 'none';
            base64Temp = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function loadVitrina() {
        if(!window.f) return setTimeout(loadVitrina, 500);
        const q = window.f.query(window.f.collection(window.db, "v4_vitrina"), window.f.where("provincia", "==", activeProvincia), window.f.orderBy("date", "desc"));
        window.f.onSnapshot(q, (snap) => {
            const feed = document.getElementById('main-vitrina');
            feed.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                feed.innerHTML += `
                    <div class="rr-card">
                        <div class="media-holder"><img src="${p.img}">
                            <div class="price-tag">S/ ${p.price}</div>
                        </div>
                        <div class="card-body">
                            <h3 style="font-weight:900; font-size:22px; margin-bottom:10px;">${p.title}</h3>
                            <p style="font-size:12px; color:#64748b; margin-bottom:15px;">📍 ${p.provincia}</p>
                            <button class="btn-rr btn-chat-privado" onclick="irChatPrivado('${p.uid}')">
                                <i class="fas fa-envelope"></i> ENVIAR MENSAJE PRIVADO
                            </button>
                        </div>
                    </div>
                `;
            });
        });
    }

    async function deployProduct() {
        if((window.currentUser?.credits || 0) < 1) return openModal('modal-yape');
        const title = document.getElementById('sell-title').value;
        const price = document.getElementById('sell-price').value;
        if(!title || !price || !base64Temp) return alert("Completa todos los datos y foto.");

        await window.f.addDoc(window.f.collection(window.db, "v4_vitrina"), {
            title, price, img: base64Temp, uid: miSession,
            provincia: activeProvincia, date: window.f.serverTimestamp()
        });

        await window.f.updateDoc(window.f.doc(window.db, "v4_users", miSession), { credits: window.f.increment(-1) });
        confetti(); alert("¡Publicado en " + activeProvincia + "!");
        nav('home', document.querySelector('.dock-link'));
    }

    // --- 7. COMUNIDAD / CHAT GRUPAL ---
    function loadChat() {
        if(!window.f) return;
        const q = window.f.query(window.f.collection(window.db, "v4_chat"), window.f.where("provincia", "==", activeProvincia), window.f.orderBy("date", "asc"));
        window.f.onSnapshot(q, snap => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.uid === miSession;
                box.innerHTML += `<div class="chat-bubble ${isMe ? 'bubble-me' : 'bubble-other'}"><b>${isMe?'Tú':m.uid.substr(0,5)}:</b><br>${m.txt}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    async function sendGroupMsg() {
        const txt = document.getElementById('chat-input').value;
        if(!txt) return;
        await window.f.addDoc(window.f.collection(window.db, "v4_chat"), {
            uid: miSession, txt, provincia: activeProvincia, date: window.f.serverTimestamp()
        });
        document.getElementById('chat-input').value = "";
    }

    async function reportYape() {
        const code = document.getElementById('yape-op-code').value;
        if(code.length < 5) return alert("Código inválido");
        await window.f.addDoc(window.f.collection(window.db, "v4_audit"), {
            uid: miSession, code, status: "pending", date: window.f.serverTimestamp()
        });
        alert("Pago enviado. El Admin aprobará pronto.");
        closeModal('modal-yape');
    }

    // UI Tools
    function nav(id, el) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById('page-'+id).style.display = 'block';
        document.querySelectorAll('.dock-link').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
    }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>

</body>
</html>
