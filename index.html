<script type="module">
    // 1. Importamos Firebase y las herramientas de Base de Datos (Firestore)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    // 2. Tu Configuración de Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDYF0A8d5pyS-HpbqAADi-TTu_BeRoG3jw",
        authDomain: "rantiy-y-rantikuy.firebaseapp.com",
        projectId: "rantiy-y-rantikuy",
        storageBucket: "rantiy-y-rantikuy.firebasestorage.app",
        messagingSenderId: "49676513708",
        appId: "1:49676513708:web:943ad781c98cb7bac78a09"
    };

    // 3. Inicializamos la App y la Base de Datos
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Variables locales para la interfaz
    window.dbLocal = { contacts: [], inventory: [] };
    window.currentID = null;
    window.tempProdImg = "";
    let rec; let chunks = []; let taps = 0;

    // ==========================================
    // CONEXIÓN EN TIEMPO REAL CON FIREBASE
    // ==========================================

    // Escuchar la Vitrina (Almacén) en tiempo real
    onSnapshot(collection(db, "inventory"), (snapshot) => {
        window.dbLocal.inventory = [];
        snapshot.forEach((doc) => {
            window.dbLocal.inventory.push({ id: doc.id, ...doc.data() });
        });
        window.render();
    });

    // Escuchar Contactos y Chats en tiempo real
    onSnapshot(collection(db, "contacts"), (snapshot) => {
        window.dbLocal.contacts = [];
        snapshot.forEach((doc) => {
            window.dbLocal.contacts.push({ id: doc.id, ...doc.data() });
        });
        window.render();
        if(window.currentID) window.renderMsgs(); // Actualiza el chat si está abierto
    });


    // ==========================================
    // FUNCIONES GUARDANDO EN FIREBASE (NUBE)
    // ==========================================

    window.addP = async function() {
        const n = document.getElementById('p-n').value; 
        if(!n) return;
        
        // Guardamos en Firebase en lugar de localStorage
        await addDoc(collection(db, "inventory"), {
            name: n, 
            price: document.getElementById('p-p').value, 
            unit: document.getElementById('p-u').value,
            qty: document.getElementById('p-q').value, 
            loc: document.getElementById('p-l').value, 
            note: document.getElementById('p-o').value,
            img: window.tempProdImg || 'https://via.placeholder.com/150',
            timestamp: Date.now()
        });
        
        document.getElementById('modal').style.display = 'none';
    };

    window.addC = async function() { 
        const n = document.getElementById('c-n').value; 
        if(!n) return; 
        
        await addDoc(collection(db, "contacts"), {
            name: n, 
            phone: document.getElementById('c-p').value, 
            msgs: [],
            timestamp: Date.now()
        });
        
        document.getElementById('modal').style.display = 'none'; 
    };

    window.sendTxt = async function() {
        const i = document.getElementById('m-input'); 
        if(!i.value.trim() || !window.currentID) return;
        
        const nuevoMensaje = { s:'me', t:'txt', v: i.value, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
        
        // Actualizamos el documento específico del contacto en Firebase
        const contactRef = doc(db, "contacts", window.currentID);
        await updateDoc(contactRef, {
            msgs: arrayUnion(nuevoMensaje)
        });

        i.value = ''; 
        window.uiInput(); 
    };

    window.sendMedia = async function(t, v, n="") {
        if(!window.currentID) return;
        const nuevoMensaje = { s:'me', t, v, n, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
        
        const contactRef = doc(db, "contacts", window.currentID);
        await updateDoc(contactRef, {
            msgs: arrayUnion(nuevoMensaje)
        });
    }

    // ==========================================
    // FUNCIONES DE INTERFAZ (UI)
    // ==========================================

    window.go = function(s, el) { document.getElementById('vp').style.transform = `translateX(-${s * 50}%)`; document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
    window.countAdmin = function() { taps++; if(taps===7) { alert("PANEL ADMIN: Huanta v3.0"); taps=0; } setTimeout(()=> taps=0, 2000); }
    
    window.uiInput = function() {
        const hasTxt = document.getElementById('m-input').value.trim().length > 0;
        document.getElementById('btn-send').style.display = hasTxt ? 'flex' : 'none';
        document.getElementById('btn-mic').style.display = hasTxt ? 'none' : 'flex';
    }

    window.popContact = function() {
        document.getElementById('m-content').innerHTML = `
            <h2 style="margin-bottom:20px; font-weight:900;">Registrar Cliente</h2>
            <div class="form-group"><label>Nombre del Comerciante</label><input id="c-n" class="input-p"></div>
            <div class="form-group"><label>Número de WhatsApp</label><input id="c-p" class="input-p" type="tel"></div>
            <button onclick="window.addC()" style="width:100%; padding:18px; background:var(--gradient-main); color:white; border:none; border-radius:15px; font-weight:900;">INICIAR CHAT</button>
        `;
        document.getElementById('modal').style.display = 'flex';
    }

    window.popProd = function() {
        window.tempProdImg = "";
        document.getElementById('m-content').innerHTML = `
            <h2 style="margin-bottom:20px; font-weight:900;">Detalles del Producto</h2>
            <div class="form-group"><label>Nombre del Producto</label><input id="p-n" class="input-p"></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div class="form-group"><label>Precio Venta</label><input id="p-p" class="input-p"></div>
                <div class="form-group"><label>Medida</label><select id="p-u" class="input-p"><option>Unidades</option><option>Docenas</option><option>Cajas</option></select></div>
            </div>
            <div class="form-group"><label>Stock</label><input id="p-q" class="input-p" type="number"></div>
            <div class="form-group"><label>Ubicación</label><input id="p-l" class="input-p"></div>
            <div class="form-group">
                <label>Imagen del Producto</label>
                <div class="btn-file-dummy" onclick="document.getElementById('p-img-file').click()">📸 SELECCIONAR DE GALERÍA</div>
                <input type="file" id="p-img-file" hidden accept="image/*" onchange="window.previewProdImg(this)">
                <div id="p-preview-container"></div>
            </div>
            <div class="form-group"><label>Nota Detallada</label><textarea id="p-o" class="input-p" style="height:80px;"></textarea></div>
            <button onclick="window.addP()" style="width:100%; padding:18px; background:var(--gradient-main); color:white; border:none; border-radius:15px; font-weight:900;">GUARDAR EN ALMACÉN</button>
        `;
        document.getElementById('modal').style.display = 'flex';
    }

    window.previewProdImg = function(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            window.tempProdImg = e.target.result;
            document.getElementById('p-preview-container').innerHTML = `<img src="${window.tempProdImg}" class="prod-img-preview">`;
        };
        reader.readAsDataURL(file);
    }

    window.openChat = function(id) { 
        window.currentID = id; 
        const c = window.dbLocal.contacts.find(x => x.id === id); 
        if(!c) return;
        document.getElementById('active-name').innerText = c.name; 
        document.getElementById('active-phone').innerText = c.phone || "Sin número"; 
        document.getElementById('active-av').innerText = c.name[0]; 
        document.getElementById('chat-window').style.display = 'flex'; 
        window.renderMsgs(); 
    }
    
    window.closeChat = function() { document.getElementById('chat-window').style.display = 'none'; window.currentID = null; }

    window.renderMsgs = function() {
        if(!window.currentID) return;
        const c = window.dbLocal.contacts.find(x => x.id === window.currentID);
        if(!c || !c.msgs) return;

        document.getElementById('m-flow').innerHTML = c.msgs.map(m => {
            let html = m.v;
            if(m.t === 'img') html = `<img src="${m.v}" style="width:100%; border-radius:10px;">`;
            if(m.t === 'audio') html = `<audio controls src="${m.v}" style="width:210px;"></audio>`;
            if(m.t === 'doc') html = `<a href="${m.v}" download="${m.n}" style="display:block; padding:10px; background:#f9f9f9; border-radius:8px; color:black;">📄 ${m.n}</a>`;
            return `<div class="msg-bubble ${m.s}">${html}<div style="font-size:10px; opacity:0.6; text-align:right;">${m.time}</div></div>`;
        }).join('');
        const f = document.getElementById('m-flow'); f.scrollTop = f.scrollHeight;
    }

    window.render = function() {
        document.getElementById('list-contacts').innerHTML = window.dbLocal.contacts.map(c => `
            <div class="card-stock" onclick="window.openChat('${c.id}')" style="border-top:none; border-left:5px solid var(--emerald-mid); display:flex; align-items:center; gap:15px; padding:15px; cursor:pointer;">
                <div style="width:50px; height:50px; background:var(--soft-sky); color:var(--emerald-mid); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900;">${c.name[0]}</div>
                <div style="flex:1"><b>${c.name}</b><small style="display:block; color:gray;">${c.phone || ''}</small></div>
                <span>›</span>
            </div>
        `).join('');

        document.getElementById('list-inventory').innerHTML = window.dbLocal.inventory.map(p => `
            <div class="card-stock">
                <img src="${p.img}" class="prod-img-preview" style="margin-top:0; margin-bottom:15px; height:180px;">
                <span class="stock-tag">${p.unit}</span>
                <h3 style="margin-top:10px;">${p.name}</h3>
                <div class="stock-grid">
                    <div class="stock-item">Precio:<b>S/ ${p.price}</b></div>
                    <div class="stock-item">Stock:<b>${p.qty}</b></div>
                    <div class="stock-item">Ubicación:<b>${p.loc}</b></div>
                </div>
                ${p.note ? `<div class="stock-note"><b>Nota:</b> ${p.note}</div>` : ''}
            </div>
        `).join('');
    }

    // Inicializar micrófono y manejo de archivos
    const mic = document.getElementById('btn-mic');
    mic.onpointerdown = async (e) => {
        e.preventDefault();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            rec = new MediaRecorder(stream); chunks = [];
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/ogg; codecs=opus' });
                const reader = new FileReader();
                reader.onload = () => window.sendMedia('audio', reader.result);
                reader.readAsDataURL(blob);
            };
            rec.start(); mic.classList.add('active');
        } catch(err) { alert("Activa el micrófono"); }
    };
    mic.onpointerup = () => { if(rec && rec.state !== 'inactive') { rec.stop(); mic.classList.remove('active'); } };

    window.handleFile = function(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = () => { window.sendMedia(file.type.includes('image') ? 'img' : 'doc', reader.result, file.name); input.value = ''; };
        reader.readAsDataURL(file);
    }

    // Iniciar funciones de carga de zonas (asegúrate de que cargarZonas exista en tu código arriba de este script)
    cargarZonas();
</script>
