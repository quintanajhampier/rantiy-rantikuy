<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rantiy-Rantikuy | Professional Business OS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --rr-neon: #00f59b;
            --rr-neon-dim: rgba(0, 245, 155, 0.2);
            --rr-bg: #050a14;
            --rr-surface: #0f172a;
            --rr-surface-light: #1e293b;
            --rr-accent: #7d33ff;
            --rr-danger: #ff4b5c;
            --rr-text-main: #f8fafc;
            --rr-text-dim: #94a3b8;
            --rr-border: rgba(255, 255, 255, 0.08);
            --rr-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.5);
        }

        /* --- BASE RESET & PERFORMANCE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--rr-bg); 
            color: var(--rr-text-main); 
            height: 100vh; 
            overflow: hidden; 
            touch-action: manipulation;
        }

        /* --- LAYERS SYSTEM (ANTI-BLACK SCREEN) --- */
        .system-layer {
            position: fixed; inset: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9000; background: var(--rr-bg); padding: 25px;
            animation: layerTransition 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .active-layer { display: flex !important; }

        @keyframes layerTransition {
            from { opacity: 0; transform: scale(1.02) translateY(5px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- UI KIT COMPONENTS --- */
        .glass-panel {
            background: var(--rr-surface);
            border: 1px solid var(--rr-border);
            border-radius: 32px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--rr-shadow);
        }

        .rr-input-group { width: 100%; margin-bottom: 20px; text-align: left; }
        .rr-label { display: block; font-size: 12px; font-weight: 800; color: var(--rr-neon); margin-bottom: 8px; margin-left: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        .rr-field {
            width: 100%; background: #0b1120; border: 2px solid #1e293b;
            padding: 18px; border-radius: 20px; color: white;
            font-size: 16px; font-weight: 600; transition: all 0.3s ease;
        }
        .rr-field:focus { border-color: var(--rr-neon); box-shadow: 0 0 20px var(--rr-neon-dim); background: #0f172a; }

        .rr-btn-primary {
            width: 100%; background: var(--rr-neon); color: var(--rr-bg);
            padding: 20px; border-radius: 22px; border: none;
            font-weight: 900; font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .rr-btn-primary:active { transform: scale(0.96); }

        /* --- MAIN APP INTERFACE --- */
        #app-shell { display: none; height: 100vh; flex-direction: column; }

        header {
            padding: 20px; background: rgba(5, 10, 20, 0.85); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--rr-border); z-index: 5000;
        }

        .header-loc { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .loc-circle { width: 45px; height: 45px; background: var(--rr-neon); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--rr-bg); font-weight: 900; font-size: 20px; box-shadow: 0 5px 15px var(--rr-neon-dim); }

        /* --- SCROLLABLE CONTENT AREAS --- */
        .viewport { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; scroll-behavior: smooth; }

        /* VITRINA CARDS */
        .product-card {
            background: var(--rr-surface); border-radius: 35px; overflow: hidden;
            border: 1px solid var(--rr-border); margin-bottom: 25px;
            animation: cardEnter 0.5s ease backwards;
        }
        @keyframes cardEnter { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .card-media { width: 100%; height: 380px; position: relative; background: #000; }
        .card-media img { width: 100%; height: 100%; object-fit: cover; }
        .price-tag { position: absolute; top: 20px; right: 20px; background: var(--rr-neon); color: var(--rr-bg); padding: 10px 22px; border-radius: 18px; font-weight: 900; font-size: 22px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }

        .card-info { padding: 25px; }
        .seller-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .seller-avatar { width: 35px; height: 35px; background: var(--rr-accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; }

        /* CHAT UI PROFESSIONAL */
        #chat-window { display: flex; flex-direction: column; height: 100%; }
        .message-feed { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding: 10px; }
        .bubble { padding: 16px 20px; border-radius: 25px; max-width: 85%; font-size: 14px; position: relative; line-height: 1.5; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .b-me { background: var(--rr-neon); color: var(--rr-bg); align-self: flex-end; border-bottom-right-radius: 5px; font-weight: 600; }
        .b-other { background: var(--rr-surface-light); color: white; align-self: flex-start; border-bottom-left-radius: 5px; }
        
        .chat-bar { display: flex; gap: 10px; background: var(--rr-surface); padding: 15px; border-radius: 25px; border: 1px solid var(--rr-border); margin-top: 10px; }

        /* --- DOCK NAVIGATION --- */
        .dock {
            position: fixed; bottom: 30px; left: 20px; right: 20px;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(25px);
            border-radius: 35px; padding: 15px; display: flex;
            justify-content: space-around; border: 1px solid var(--rr-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); z-index: 9999;
        }
        .nav-link {
            background: none; border: none; color: var(--rr-text-dim);
            font-size: 10px; font-weight: 800; display: flex;
            flex-direction: column; align-items: center; gap: 6px; cursor: pointer;
            transition: 0.3s;
        }
        .nav-link i { font-size: 26px; transition: 0.3s; }
        .nav-link.active { color: var(--rr-neon); }
        .nav-link.active i { transform: translateY(-5px); text-shadow: 0 0 15px var(--rr-neon-dim); }

        /* --- FORM DYNAMICS --- */
        .preview-container { width: 100%; height: 280px; border-radius: 25px; overflow: hidden; margin-bottom: 20px; border: 2px dashed var(--rr-surface-light); display: none; }
        .preview-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .cat-step { display: none; animation: fadeIn 0.3s; }

        /* --- ADMIN GESTURE --- */
        #admin-trigger { width: 50px; height: 50px; position: absolute; top: 0; left: 0; opacity: 0; z-index: 10000; }
    </style>
</head>
<body>

    <div id="admin-trigger" onclick="window.engine.trackAdmin()"></div>

    <div id="layer-auth" class="system-layer">
        <div class="glass-panel">
            <div style="text-align: center; margin-bottom: 30px;">
                <div style="width: 80px; height: 80px; background: var(--rr-neon); border-radius: 25px; display: inline-flex; align-items: center; justify-content: center; color: var(--rr-bg); font-weight: 900; font-size: 35px; margin-bottom: 15px;">R</div>
                <h1 style="font-weight: 900; letter-spacing: -1px;">Bienvenido Socio</h1>
                <p style="color: var(--rr-text-dim);">Entra al ecosistema Rantiy-Rantikuy</p>
            </div>
            
            <div class="rr-input-group">
                <label class="rr-label">Identidad Comercial</label>
                <input type="text" id="auth-name" class="rr-field" placeholder="Ej: Juan Pérez">
            </div>

            <div class="rr-input-group">
                <label class="rr-label">Línea de Negocio (WhatsApp)</label>
                <input type="number" id="auth-phone" class="rr-field" placeholder="9XXXXXXXX">
            </div>

            <button class="rr-btn-primary" onclick="window.engine.executeAuth()">
                AUTORIZAR ACCESO <i class="fas fa-shield-check"></i>
            </button>
            
            <p style="font-size: 10px; color: var(--rr-text-dim); text-align: center; margin-top: 20px;" onclick="location.href='registro_entrada.html'">
                ¿Problemas de acceso? Ver logs de entrada.
            </p>
        </div>
    </div>

    <div id="layer-gps" class="system-layer">
        <i class="fas fa-satellite-dish fa-beat" style="font-size: 70px; color: var(--rr-neon);"></i>
        <h2 style="margin-top: 30px; font-weight: 900; font-size: 24px;">Sincronizando Nodo Regional</h2>
        <p style="color: var(--rr-text-dim); margin-top: 10px;">Estableciendo conexión con la provincia...</p>
        <div style="width: 200px; height: 4px; background: var(--rr-surface-light); border-radius: 10px; margin-top: 30px; overflow: hidden;">
            <div id="gps-bar" style="width: 0%; height: 100%; background: var(--rr-neon); transition: 0.5s;"></div>
        </div>
    </div>

    <div id="app-shell">
        <header>
            <div class="header-loc" onclick="window.engine.refreshGPS()">
                <div class="loc-circle"><i class="fas fa-map-marker-alt"></i></div>
                <div>
                    <div id="ui-city" style="font-weight: 900; font-size: 18px;">CARGANDO...</div>
                    <div style="font-size: 10px; color: var(--rr-neon); font-weight: 800; letter-spacing: 1px;">MODO RED ACTIVA</div>
                </div>
            </div>
            <div style="display:flex; gap:15px;">
                <i class="fas fa-search" style="font-size: 20px; color: var(--rr-text-dim);"></i>
                <i class="fas fa-user-circle" style="font-size: 24px; color: var(--rr-neon);" onclick="location.href='perfil.html'"></i>
            </div>
        </header>

        <main class="viewport">
            
            <section id="view-home" class="app-view">
                <div id="render-feed"></div>
            </section>

            <section id="view-sell" class="app-view" style="display:none;">
                <div class="glass-panel" style="max-width: 100%; border: none;">
                    <h2 style="font-weight: 900; margin-bottom: 25px;">Publicar en <span id="sell-city">...</span></h2>
                    
                    <div id="img-preview-box" class="preview-container">
                        <img id="img-final" src="">
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
                        <button class="rr-btn-primary" style="background: var(--rr-surface-light); color: white;" onclick="document.getElementById('in-cam').click()">
                            <i class="fas fa-camera"></i> CÁMARA
                        </button>
                        <button class="rr-btn-primary" style="background: var(--rr-surface-light); color: white;" onclick="document.getElementById('in-gal').click()">
                            <i class="fas fa-images"></i> GALERÍA
                        </button>
                    </div>

                    <input type="file" id="in-cam" hidden capture="environment" accept="image/*" onchange="window.engine.processMedia(this)">
                    <input type="file" id="in-gal" hidden accept="image/*" onchange="window.engine.processMedia(this)">

                    <div class="rr-input-group">
                        <label class="rr-label">Título del Producto</label>
                        <input type="text" id="sell-title" class="rr-field" placeholder="¿Qué ofreces?">
                    </div>

                    <div class="rr-input-group">
                        <label class="rr-label">Precio Final (Soles)</label>
                        <input type="number" id="sell-price" class="rr-field" placeholder="S/ 0.00">
                    </div>

                    <div class="rr-input-group">
                        <label class="rr-label">Categoría Estratégica</label>
                        <select id="sell-cat" class="rr-field" onchange="window.engine.formStep(this.value)">
                            <option value="">Seleccionar...</option>
                            <option value="tec">Tecnología / Móviles</option>
                            <option value="fashion">Moda / Calzado</option>
                            <option value="home">Hogar / Servicios</option>
                        </select>
                    </div>

                    <div id="step-tec" class="cat-step">
                        <div class="rr-input-group">
                            <label class="rr-label">Estado de Batería / Uso</label>
                            <input type="text" class="rr-field" placeholder="Ej: 90% vida, como nuevo">
                        </div>
                    </div>

                    <button class="rr-btn-primary" onclick="window.engine.deployProduct()">
                        PUBLICAR AHORA <i class="fas fa-rocket"></i>
                    </button>
                </div>
            </section>

            <section id="view-chat" class="app-view" style="display:none; height: 100%;">
                <div id="chat-window">
                    <div id="feed-global" class="message-feed"></div>
                    <div class="chat-bar">
                        <input type="text" id="msg-input" class="rr-field" style="margin: 0; padding: 12px;" placeholder="Mensaje para la ciudad...">
                        <button class="rr-btn-primary" style="width: 60px; padding: 0;" onclick="window.engine.broadcast()">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </section>

        </main>

        <nav class="dock">
            <button class="nav-link active" onclick="window.engine.route('home', this)">
                <i class="fas fa-store-alt"></i> VITRINA
            </button>
            <button class="nav-link" onclick="window.engine.route('sell', this)">
                <i class="fas fa-plus-circle"></i> VENDER
            </button>
            <button class="nav-link" onclick="window.engine.route('chat', this)">
                <i class="fas fa-comments"></i> CIUDAD
            </button>
            <button class="nav-link" onclick="location.href='chat_privado.html'">
                <i class="fas fa-envelope"></i> PRIVADOS
            </button>
        </nav>
    </div>

    <script type="module">
        // IMPORTACIÓN DE MÓDULOS DEL MOTOR EXTERNO
        import { 
            conectarChatGrupal, enviarMensajeGrupal, 
            conectarVitrina, subirProducto 
        } from './firebase-engine.js';

        window.engine = {
            profile: JSON.parse(localStorage.getItem('rr_v10_user')),
            city: "HUANCAYO",
            currentImg: "",
            adminHits: 0,

            init: function() {
                console.log("Rantiy-Rantikuy OS Initializing...");
                
                // Sistema de Historial para botón atrás del celular
                window.onpopstate = (e) => {
                    if(e.state && e.state.view) this.route(e.state.view, null, false);
                };

                if(!this.profile) {
                    this.switchLayer('auth');
                } else {
                    this.syncGPS();
                }
            },

            switchLayer: function(id) {
                document.querySelectorAll('.system-layer').forEach(l => l.classList.remove('active-layer'));
                document.getElementById('layer-'+id).classList.add('active-layer');
            },

            executeAuth: function() {
                const name = document.getElementById('auth-name').value;
                const phone = document.getElementById('auth-phone').value;

                if(name.length < 3 || phone.length < 9) {
                    return Swal.fire({ icon: 'error', title: 'Error de Validación', text: 'Datos comerciales incompletos.', background: '#0f172a', color: '#fff' });
                }

                this.profile = { uid: "RR-" + Date.now(), name, phone };
                localStorage.setItem('rr_v10_user', JSON.stringify(this.profile));
                location.reload();
            },

            syncGPS: function() {
                this.switchLayer('gps');
                let bar = document.getElementById('gps-bar');
                let step = 0;
                let interval = setInterval(() => {
                    step += 10;
                    bar.style.width = step + "%";
                    if(step >= 100) clearInterval(interval);
                }, 100);

                navigator.geolocation.getCurrentPosition(async (pos) => {
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                        const data = await res.json();
                        this.city = (data.address.county || data.address.city || "HUANCAYO").toUpperCase();
                    } catch(e) { this.city = "HUANCAYO"; }
                    this.bootApp();
                }, () => {
                    this.city = "HUANCAYO";
                    this.bootApp();
                });
            },

            bootApp: function() {
                document.getElementById('layer-gps').classList.remove('active-layer');
                document.getElementById('app-shell').style.display = 'flex';
                document.getElementById('ui-city').innerText = this.city;
                document.getElementById('sell-city').innerText = this.city;
                this.startStreams();
            },

            startStreams: function() {
                // STREAM 1: Vitrina Global
                conectarVitrina(this.city, (items) => {
                    const render = document.getElementById('render-feed');
                    render.innerHTML = items.map(p => `
                        <div class="product-card">
                            <div class="card-media">
                                <img src="${p.img}" loading="lazy">
                                <div class="price-tag">S/ ${p.price}</div>
                            </div>
                            <div class="card-info">
                                <div class="seller-row">
                                    <div class="seller-avatar">${p.nombreCorto}</div>
                                    <div style="font-size:10px; color:var(--rr-text-dim);">📍 ${p.provincia}</div>
                                </div>
                                <h3 style="font-size:22px; font-weight:800; margin-bottom:20px;">${p.title}</h3>
                                <button class="rr-btn-primary" style="background:var(--rr-accent); color:white;" 
                                    onclick="location.href='chat_privado.html?target=${p.uid}&item=${p.title}'">
                                    CONTACTAR NEGOCIO <i class="fab fa-whatsapp"></i>
                                </button>
                            </div>
                        </div>
                    `).join('');
                });

                // STREAM 2: Chat de la Ciudad
                conectarChatGrupal(this.city, (msgs) => {
                    const feed = document.getElementById('feed-global');
                    feed.innerHTML = msgs.map(m => `
                        <div class="bubble ${m.uid === this.profile.uid ? 'b-me' : 'b-other'}">
                            <span style="font-size:9px; display:block; opacity:0.7; margin-bottom:5px; font-weight:900;">${m.nombre}</span>
                            ${m.txt}
                        </div>
                    `).join('');
                    const scrollArea = document.querySelector('.viewport');
                    scrollArea.scrollTop = scrollArea.scrollHeight;
                });
            },

            route: function(viewId, btn, push = true) {
                document.querySelectorAll('.app-view').forEach(v => v.style.display = 'none');
                document.getElementById('view-'+viewId).style.display = 'block';
                
                if(btn) {
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                    btn.classList.add('active');
                }

                if(push) history.pushState({view: viewId}, "", "#"+viewId);
            },

            processMedia: function(input) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    this.currentImg = e.target.result;
                    document.getElementById('img-final').src = e.target.result;
                    document.getElementById('img-preview-box').style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            },

            formStep: function(val) {
                document.querySelectorAll('.cat-step').forEach(s => s.style.display = 'none');
                if(val === 'tec') document.getElementById('step-tec').style.display = 'block';
            },

            deployProduct: async function() {
                const title = document.getElementById('sell-title').value;
                const price = document.getElementById('sell-price').value;

                if(!title || !price || !this.currentImg) {
                    return Swal.fire({ icon: 'warning', title: 'Atención', text: 'La vitrina requiere imagen y datos.', background: '#0f172a', color: '#fff' });
                }

                Swal.showLoading();
                await subirProducto(this.profile, { title, price, img: this.currentImg }, this.city);
                
                confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
                
                // Reset y Volver
                document.getElementById('sell-title').value = "";
                document.getElementById('sell-price').value = "";
                document.getElementById('img-preview-box').style.display = 'none';
                this.route('home', document.querySelector('.nav-link'));
                Swal.fire({ icon: 'success', title: '¡Éxito!', text: 'Producto en vitrina.', timer: 1500, showConfirmButton: false, background: '#0f172a', color: '#fff' });
            },

            broadcast: async function() {
                const inMsg = document.getElementById('msg-input');
                if(!inMsg.value.trim()) return;
                const txt = inMsg.value;
                inMsg.value = "";
                await enviarMensajeGrupal(this.profile, txt, this.city);
            },

            trackAdmin: function() {
                this.adminHits++;
                if(this.adminHits >= 10) location.href = 'admin.html';
            },

            refreshGPS: function() {
                location.reload();
            }
        };

        window.engine.init();
    </script>
</body>
</html>
