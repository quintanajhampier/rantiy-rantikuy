
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rantiy-Rantikuy | App Oficial</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --rr-brand: #00f59b;
            --rr-deep: #050a14;
            --rr-accent: #7d33ff;
            --glass: rgba(10, 15, 30, 0.8);
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #0b0f1a; color: #e2e8f0; overflow-x: hidden; padding-bottom: 120px; }

        /* --- PANTALLAS DE BLOQUEO --- */
        .fullscreen-overlay {
            position: fixed; inset: 0; background: #050a14; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;
        }
        .logo-big { width: 100px; height: 100px; background: var(--rr-brand); border-radius: 30px; display: flex; align-items: center; justify-content: center; color: var(--rr-deep); font-weight: 900; font-size: 32px; margin-bottom: 25px; box-shadow: 0 0 40px rgba(0, 245, 155, 0.3); }
        
        .auth-box { background: #1a2235; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.05); }
        .input-rr { width: 100%; background: #0b0f1a; border: 1px solid rgba(255,255,255,0.1); padding: 18px; border-radius: 20px; color: white; font-weight: 600; margin-bottom: 15px; outline: none; transition: 0.3s; }
        .input-rr:focus { border-color: var(--rr-brand); }
        .btn-rr-main { width: 100%; background: var(--rr-brand); color: var(--rr-deep); padding: 18px; border-radius: 20px; border: none; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.3s; }

        /* --- HEADER & LOCATION --- */
        header {
            background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(15px);
            padding: 20px; position: sticky; top: 0; z-index: 2000;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .main-brand { display: flex; align-items: center; gap: 15px; }
        .logo-rr { width: 50px; height: 50px; background: var(--rr-brand); border-radius: 15px; display: flex; align-items: center; justify-content: center; color: var(--rr-deep); font-weight: 900; font-size: 22px; cursor: pointer; }
        .location-tag { display: flex; flex-direction: column; }
        .location-tag span:first-child { font-size: 18px; font-weight: 900; color: white; }
        .location-tag span:last-child { font-size: 10px; font-weight: 800; color: var(--rr-brand); letter-spacing: 1px; }

        /* --- VITRINA FEED --- */
        .feed-container { padding: 20px; display: grid; grid-template-columns: 1fr; gap: 25px; }
        .rr-card { background: #1a2235; border-radius: 35px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
        .media-holder { width: 100%; height: 350px; background: #050a14; position: relative; }
        .media-holder img { width: 100%; height: 100%; object-fit: cover; }
        .price-tag { position: absolute; bottom: 20px; left: 20px; background: var(--rr-brand); color: var(--rr-deep); padding: 12px 25px; border-radius: 20px; font-weight: 900; font-size: 22px; }
        .card-body { padding: 25px; }
        .seller-info { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .seller-avatar { width: 45px; height: 45px; background: var(--rr-accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; }

        /* --- SECCIÓN VENDER (MULTIMEDIA) --- */
        .publish-form { background: #1a2235; padding: 25px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.05); }
        .media-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .media-btn { background: #0b0f1a; border: 2px dashed #232d45; padding: 15px; border-radius: 20px; color: #64748b; font-weight: 700; cursor: pointer; text-align: center; }
        .media-btn i { font-size: 24px; color: var(--rr-brand); margin-bottom: 8px; display: block; }
        .preview-box { width: 100%; height: 250px; border-radius: 25px; margin-bottom: 20px; display: none; object-fit: cover; border: 2px solid var(--rr-brand); }
        
        /* Cuestionario de Publicación */
        .spec-select { width: 100%; background: #0b0f1a; color: white; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; font-weight: 600; }

        /* --- CHAT GRUPAL --- */
        .chat-space { height: calc(100vh - 200px); display: flex; flex-direction: column; padding: 15px; }
        .chat-main { flex: 1; background: #161c2d; border-radius: 35px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05); }
        .chat-scroll { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .chat-bubble { padding: 15px 20px; border-radius: 25px; font-size: 14px; max-width: 85%; line-height: 1.5; }
        .bubble-me { background: var(--rr-brand); color: var(--rr-deep); align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 600; }
        .bubble-other { background: #232d45; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-input-area { padding: 15px; background: #1a2235; display: flex; gap: 10px; align-items: center; }

        /* --- DOCK NAVEGACIÓN --- */
        .dock { position: fixed; bottom: 25px; left: 20px; right: 20px; background: rgba(26, 34, 53, 0.95); backdrop-filter: blur(20px); border-radius: 30px; padding: 15px; display: flex; justify-content: space-around; z-index: 4000; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .dock-link { color: #64748b; font-size: 10px; font-weight: 800; background: none; border: none; display:flex; flex-direction:column; align-items:center; cursor: pointer; transition: 0.3s; }
        .dock-link.active { color: var(--rr-brand); transform: translateY(-5px); }
        .dock-link i { font-size: 24px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="screen-auth" class="fullscreen-overlay" style="display:none;">
    <div class="logo-big">R&R</div>
    <h1 style="font-weight:900; margin-bottom:10px;">Rantiy-Rantikuy</h1>
    <p style="color:#94a3b8; margin-bottom:30px;">Tu negocio digital empieza aquí.</p>
    <div class="auth-box">
        <input type="text" id="reg-name" class="input-rr" placeholder="Nombre completo">
        <input type="number" id="reg-phone" class="input-rr" placeholder="WhatsApp (9 dígitos)">
        <button class="btn-rr-main" onclick="guardarRegistro()">EMPEZAR A FACTURAR</button>
    </div>
</div>

<div id="screen-gps" class="fullscreen-overlay" style="display:none;">
    <div class="logo-big"><i class="fas fa-satellite-dish"></i></div>
    <h2 style="font-weight:900;">Sincronizando Zona</h2>
    <p id="gps-status" style="margin-top:15px; color:#64748b;">Conectando con las 196 provincias...</p>
</div>

<div id="app-core" style="display:none;">
    <header>
        <div class="main-brand">
            <div class="logo-rr" onclick="hitAdmin()">R&R</div>
            <div class="location-tag">
                <span id="ui-provincia">Detectando...</span>
                <span>📍 CIUDAD VERIFICADA</span>
            </div>
        </div>
        <div style="color:var(--rr-brand); font-size:20px;"><i class="fas fa-bell"></i></div>
    </header>

    <main id="page-home" class="view">
        <div class="feed-container" id="main-vitrina">
            </div>
    </main>

    <section id="page-sell" class="view" style="display:none; padding:20px;">
        <div class="publish-form">
            <h2 style="font-weight:900; margin-bottom:20px;">Nueva Publicación</h2>
            
            <img id="preview-media" class="preview-box">
            
            <div class="media-selector">
                <div class="media-btn" onclick="document.getElementById('in-cam').click()">
                    <i class="fas fa-camera"></i> Tomar Foto
                    <input type="file" id="in-cam" hidden capture="environment" accept="image/*" onchange="handleMedia(this)">
                </div>
                <div class="media-btn" onclick="document.getElementById('in-gal').click()">
                    <i class="fas fa-images"></i> Galería
                    <input type="file" id="in-gal" hidden accept="image/*" onchange="handleMedia(this)">
                </div>
            </div>

            <div class="media-btn" style="width:100%; margin-bottom:20px;" onclick="alert('Función de Audio en desarrollo para v7')">
                <i class="fas fa-microphone"></i> Grabar Audio Descriptivo
            </div>

            <input type="text" id="sell-title" class="input-rr" placeholder="¿Qué estás vendiendo?">
            <input type="number" id="sell-price" class="input-rr" placeholder="Precio en Soles S/">
            
            <p style="font-size:12px; font-weight:800; color:var(--rr-brand); margin-bottom:10px;">ESPECIFICACIONES DEL PRODUCTO:</p>
            <select id="sell-cat" class="spec-select">
                <option value="nuevo">Estado: Nuevo de Paquete</option>
                <option value="usado">Estado: Como Nuevo (Poco uso)</option>
                <option value="remate">Estado: Para Reparar / Remate</option>
            </select>
            
            <select id="sell-delivery" class="spec-select">
                <option value="si">¿Haces Delivery? : SÍ</option>
                <option value="no">¿Haces Delivery? : NO (Recojo en local)</option>
            </select>

            <button class="btn-rr-main" onclick="publicarAhora()">PUBLICAR EN LA CIUDAD</button>
        </div>
    </section>

    <section id="page-chat" class="view" style="display:none;">
        <div class="chat-space">
            <div class="chat-main">
                <div class="chat-scroll" id="chat-box"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" class="input-rr" style="margin:0;" placeholder="Habla con tu ciudad...">
                    <button class="btn-rr-main" style="width:60px;" onclick="enviarMensaje()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </section>

    <nav class="dock">
        <button class="dock-link active" onclick="nav('home', this)"><i class="fas fa-store"></i>VITRINA</button>
        <button class="dock-link" onclick="nav('sell', this)"><i class="fas fa-plus-circle"></i>VENDER</button>
        <button class="dock-link" onclick="nav('chat', this)"><i class="fas fa-comments"></i>CIUDAD</button>
        <button class="dock-link" onclick="window.location.href='chat_privado.html'"><i class="fas fa-envelope"></i>PRIVADOS</button>
    </nav>
</div>

<script type="module">
    import { 
        conectarChatGrupal, enviarMensajeGrupal, 
        conectarVitrina, subirProducto 
    } from './js/firebase-engine.js';

    // Persistencia y Estado
    window.miPerfil = JSON.parse(localStorage.getItem('rr_perfil_v5'));
    window.miProvincia = "";
    window.base64Temp = "";
    let adminHits = 0;

    window.onload = () => {
        if (!window.miPerfil) document.getElementById('screen-auth').style.display = 'flex';
        else iniciarGPS();
    };

    window.guardarRegistro = () => {
        const n = document.getElementById('reg-name').value;
        const p = document.getElementById('reg-phone').value;
        if(n.length > 2 && p.length > 8) {
            window.miPerfil = { uid: "U-"+Date.now(), nombre: n, telefono: p };
            localStorage.setItem('rr_perfil_v5', JSON.stringify(window.miPerfil));
            location.reload();
        } else { alert("Datos inválidos"); }
    };

    // --- GPS MOTOR ---
    function iniciarGPS() {
        document.getElementById('screen-gps').style.display = 'flex';
        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                const data = await res.json();
                window.miProvincia = (data.address.county || data.address.city || "HUANCAYO").toUpperCase();
                arrancarTodo();
            } catch(e) { window.miProvincia = "HUANCAYO"; arrancarTodo(); }
        }, () => { window.miProvincia = "HUANCAYO"; arrancarTodo(); });
    }

    // --- ARRANQUE DE CONEXIONES ---
    function arrancarTodo() {
        document.getElementById('screen-gps').style.display = 'none';
        document.getElementById('app-core').style.display = 'block';
        document.getElementById('ui-provincia').innerText = window.miProvincia;

        // 1. Vitrina Realtime (Desde el motor)
        conectarVitrina(window.miProvincia, (productos) => {
            const feed = document.getElementById('main-vitrina');
            feed.innerHTML = productos.map(p => `
                <div class="rr-card">
                    <div class="media-holder">
                        <img src="${p.img}">
                        <div class="price-tag">S/ ${p.price}</div>
                    </div>
                    <div class="card-body">
                        <div class="seller-info">
                            <div class="seller-avatar">${p.nombreCorto}</div>
                            <div>
                                <p style="font-weight:800; color:white;">${p.title}</p>
                                <p style="font-size:10px; color:var(--rr-brand);">📍 ${p.provincia}</p>
                            </div>
                        </div>
                        <button class="btn-rr-main" style="background:var(--rr-accent); color:white;" onclick="window.location.href='chat_privado.html?chat_con=${p.uid}'">
                            NEGOCIAR AL PRIVADO
                        </button>
                    </div>
                </div>
            `).join('');
        });

        // 2. Chat Realtime (Desde el motor)
        conectarChatGrupal(window.miProvincia, (mensajes) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = mensajes.map(m => `
                <div class="chat-bubble ${m.uid === window.miPerfil.uid ? 'bubble-me' : 'bubble-other'}">
                    <span style="font-size:9px; font-weight:900; display:block; margin-bottom:4px; opacity:0.8;">${m.nombre}</span>
                    ${m.txt}
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        });
    }

    // --- ACCIONES DE PUBLICACIÓN ---
    window.handleMedia = (input) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            window.base64Temp = e.target.result;
            const prev = document.getElementById('preview-media');
            prev.src = e.target.result;
            prev.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    };

    window.publicarAhora = async () => {
        const title = document.getElementById('sell-title').value;
        const price = document.getElementById('sell-price').value;
        if(!title || !price || !window.base64Temp) return alert("¡Ey! Falta la foto o los datos.");

        await subirProducto(window.miPerfil, { title, price, img: window.base64Temp }, window.miProvincia);
        
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#00f59b', '#7d33ff'] });
        document.getElementById('sell-title').value = "";
        document.getElementById('sell-price').value = "";
        document.getElementById('preview-media').style.display = 'none';
        nav('home', document.querySelector('.dock-link'));
    };

    window.enviarMensaje = async () => {
        const input = document.getElementById('chat-input');
        if(!input.value.trim()) return;
        const val = input.value;
        input.value = "";
        await enviarMensajeGrupal(window.miPerfil, val, window.miProvincia);
    };

    // --- UI HELPERS ---
    window.nav = (id, el) => {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById('page-'+id).style.display = 'block';
        document.querySelectorAll('.dock-link').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
    };

    window.hitAdmin = () => {
        adminHits++;
        if(adminHits >= 10) window.location.href = 'admin.html';
    };

</script>
</body>
</html>
