<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rantiy-Rantikuy | Enterprise OS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --rr-neon: #00f59b;
            --rr-bg: #050a14;
            --rr-surface: #0f172a;
            --rr-text: #f8fafc;
            --rr-text-dim: #94a3b8;
            --rr-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--rr-bg); 
            color: var(--rr-text); 
            height: 100vh; 
            overflow: hidden; 
        }

        /* CAPAS DEL SISTEMA */
        .system-layer {
            position: fixed; inset: 0; 
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9000; background: var(--rr-bg); padding: 25px;
        }

        /* Esta clase es la que quita la pantalla negra */
        .active-layer { display: flex !important; }

        .glass-panel {
            background: var(--rr-surface);
            border: 1px solid var(--rr-border);
            border-radius: 32px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .rr-field {
            width: 100%; background: #0b1120; border: 2px solid #1e293b;
            padding: 18px; border-radius: 20px; color: white; margin-bottom: 20px;
        }

        .rr-btn-primary {
            width: 100%; background: var(--rr-neon); color: var(--rr-bg);
            padding: 20px; border-radius: 22px; border: none; font-weight: 900;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* UI PRINCIPAL */
        #app-shell { display: none; height: 100vh; flex-direction: column; }
        header { padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--rr-border); }
        .viewport { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }

        .dock {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px);
            border-radius: 30px; height: 80px; display: flex; justify-content: space-around;
            align-items: center; border: 1px solid var(--rr-border);
        }

        .nav-link { color: var(--rr-text-dim); background: none; border: none; font-size: 10px; font-weight: 800; }
        .nav-link.active { color: var(--rr-neon); }

        /* PREVENT BLACK SCREEN STUCK */
        #emergency-reset {
            position: fixed; bottom: 5px; right: 5px; opacity: 0.1; z-index: 10002; color: white; font-size: 10px;
        }
    </style>
</head>
<body>

    <div id="emergency-reset" onclick="localStorage.clear(); location.reload();">RESETEAR CACHE</div>

    <div style="position:fixed; top:0; left:0; width:50px; height:50px; z-index:10001;" onclick="engine.trackAdmin()"></div>

    <div id="layer-auth" class="system-layer">
        <div class="glass-panel">
            <div style="width:70px; height:70px; background:var(--rr-neon); border-radius:20px; display:inline-flex; align-items:center; justify-content:center; color:var(--rr-bg); font-weight:900; font-size:30px; margin-bottom:20px;">R</div>
            <h1 style="margin-bottom:10px;">Rantiy-Rantikuy</h1>
            <p style="color:var(--rr-text-dim); margin-bottom:30px;">Inicia sesión para ganar dinero</p>
            
            <input type="text" id="auth-name" class="rr-field" placeholder="Tu nombre comercial">
            <input type="number" id="auth-phone" class="rr-field" placeholder="Tu WhatsApp">
            
            <button class="rr-btn-primary" onclick="engine.executeAuth()">
                ENTRAR AL SISTEMA <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="layer-gps" class="system-layer">
        <i class="fas fa-satellite-dish fa-spin" style="font-size: 50px; color: var(--rr-neon);"></i>
        <h2 style="margin-top:20px;">Localizando Mercado...</h2>
        <p id="gps-status" style="color:var(--rr-text-dim);">Esperando señal GPS</p>
    </div>

    <div id="app-shell">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="width:40px; height:40px; background:var(--rr-neon); border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--rr-bg); font-weight:900;">R</div>
                <div>
                    <div id="ui-city" style="font-weight:900;">CARGANDO...</div>
                    <div style="font-size:9px; color:var(--rr-neon);">SISTEMA ACTIVO</div>
                </div>
            </div>
            <i class="fas fa-user-circle" style="font-size:25px; color:var(--rr-neon);" onclick="location.href='perfil.html'"></i>
        </header>

        <main class="viewport">
            <section id="view-home" class="app-view">
                <div id="render-feed" style="display:grid; gap:20px;"></div>
            </section>

            <section id="view-sell" class="app-view" style="display:none;">
                <div class="glass-panel" style="max-width:100%; text-align:left;">
                    <h2>Vender Producto</h2>
                    <br>
                    <input type="file" id="in-file" accept="image/*" class="rr-field" onchange="engine.processMedia(this)">
                    <input type="text" id="sell-title" class="rr-field" placeholder="¿Qué vendes?">
                    <input type="number" id="sell-price" class="rr-field" placeholder="Precio S/">
                    <button class="rr-btn-primary" onclick="engine.deployProduct()">PUBLICAR <i class="fas fa-rocket"></i></button>
                </div>
            </section>

            <section id="view-chat" class="app-view" style="display:none;">
                <div id="feed-global" style="display:flex; flex-direction:column; gap:10px; margin-bottom:20px;"></div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="msg-input" class="rr-field" style="margin:0;" placeholder="Escribe a la ciudad...">
                    <button class="rr-btn-primary" style="width:60px;" onclick="engine.broadcast()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </section>
        </main>

        <nav class="dock">
            <button class="nav-link active" onclick="engine.route('home', this)"><i class="fas fa-store"></i><br>VITRINA</button>
            <button class="nav-link" onclick="engine.route('sell', this)"><i class="fas fa-plus-circle"></i><br>VENDER</button>
            <button class="nav-link" onclick="engine.route('chat', this)"><i class="fas fa-comments"></i><br>CIUDAD</button>
            <button class="nav-link" onclick="location.href='chat_privado.html'"><i class="fas fa-envelope"></i><br>CHATS</button>
        </nav>
    </div>

    <script>
        // OBJETO GLOBAL PARA EVITAR ERRORES DE SCOPE
        window.engine = {
            profile: JSON.parse(localStorage.getItem('rr_user_session')),
            city: "HUANCAYO",
            currentImg: "",
            adminHits: 0,
            
            // Placeholder para funciones de Firebase
            fb: {
                conectarVitrina: null,
                subirProducto: null,
                conectarChat: null,
                enviarChat: null
            },

            init: function() {
                console.log("Iniciando Motor...");
                if(!this.profile) {
                    this.showLayer('auth');
                } else {
                    this.syncGPS();
                }
            },

            showLayer: function(id) {
                document.querySelectorAll('.system-layer').forEach(l => l.classList.remove('active-layer'));
                const target = document.getElementById('layer-'+id);
                if(target) target.classList.add('active-layer');
            },

            executeAuth: function() {
                const n = document.getElementById('auth-name').value;
                const p = document.getElementById('auth-phone').value;
                if(n.length < 3 || p.length < 9) return alert("Datos incompletos");
                
                this.profile = { uid: "ID-"+Date.now(), name: n, phone: p };
                localStorage.setItem('rr_user_session', JSON.stringify(this.profile));
                location.reload();
            },

            syncGPS: function() {
                this.showLayer('gps');
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                        const data = await res.json();
                        this.city = (data.address.county || data.address.city || "HUANCAYO").toUpperCase();
                    } catch(e) { console.log("Usando ciudad por defecto"); }
                    this.startApp();
                }, () => {
                    this.startApp(); // Inicia incluso si el GPS falla
                });
            },

            startApp: function() {
                document.querySelectorAll('.system-layer').forEach(l => l.style.display='none');
                document.getElementById('app-shell').style.display = 'flex';
                document.getElementById('ui-city').innerText = this.city;
                
                // Esperar a que Firebase cargue
                const checkFB = setInterval(() => {
                    if(this.fb.conectarVitrina) {
                        this.bindFirebase();
                        clearInterval(checkFB);
                    }
                }, 500);
            },

            bindFirebase: function() {
                this.fb.conectarVitrina(this.city, (items) => {
                    const feed = document.getElementById('render-feed');
                    feed.innerHTML = items.map(p => `
                        <div style="background:var(--rr-surface); border-radius:20px; overflow:hidden; border:1px solid var(--rr-border);">
                            <img src="${p.img}" style="width:100%; height:250px; object-fit:cover;">
                            <div style="padding:15px;">
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <h3 style="font-size:18px;">${p.title}</h3>
                                    <b style="color:var(--rr-neon);">S/ ${p.price}</b>
                                </div>
                                <button class="rr-btn-primary" style="margin-top:15px; height:45px;" onclick="location.href='chat_privado.html?target=${p.uid}&prod=${encodeURIComponent(p.title)}'">CONTACTAR</button>
                            </div>
                        </div>
                    `).join('');
                });

                this.fb.conectarChat(this.city, (msgs) => {
                    const box = document.getElementById('feed-global');
                    box.innerHTML = msgs.map(m => `
                        <div style="background:${m.uid === this.profile.uid ? 'var(--rr-neon)' : 'var(--rr-surface)'}; 
                                    color:${m.uid === this.profile.uid ? 'black' : 'white'};
                                    padding:10px; border-radius:15px; align-self:${m.uid === this.profile.uid ? 'flex-end' : 'flex-start'}; max-width:80%;">
                            <small style="font-size:8px; display:block;">${m.nombre}</small>
                            ${m.txt}
                        </div>
                    `).join('');
                });
            },

            route: function(id, btn) {
                document.querySelectorAll('.app-view').forEach(v => v.style.display = 'none');
                document.getElementById('view-'+id).style.display = 'block';
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                btn.classList.add('active');
            },

            processMedia: function(input) {
                const reader = new FileReader();
                reader.onload = (e) => { this.currentImg = e.target.result; };
                reader.readAsDataURL(input.files[0]);
            },

            deployProduct: async function() {
                const t = document.getElementById('sell-title').value;
                const p = document.getElementById('sell-price').value;
                if(!t || !p || !this.currentImg) return alert("Falta info");
                
                Swal.showLoading();
                await this.fb.subirProducto(this.profile, { title: t, price: p, img: this.currentImg }, this.city);
                Swal.fire("¡Listo!", "Producto publicado", "success");
                this.route('home', document.querySelector('.nav-link'));
            },

            broadcast: function() {
                const input = document.getElementById('msg-input');
                if(!input.value.trim()) return;
                this.fb.enviarChat(this.profile, input.value, this.city);
                input.value = "";
            },

            trackAdmin: function() {
                this.adminHits++;
                if(this.adminHits >= 10) location.href = 'admin.html';
            }
        };

        // Iniciar al cargar el DOM
        window.onload = () => engine.init();
    </script>

    <script type="module">
        // IMPORTANTE: Asegúrate que el nombre del archivo sea exactamente este
        import { 
            conectarChatGrupal, enviarMensajeGrupal, 
            conectarVitrina, subirProducto 
        } from './firebase-engine.js';

        // Pasamos las funciones al motor global
        window.engine.fb.conectarVitrina = conectarVitrina;
        window.engine.fb.subirProducto = subirProducto;
        window.engine.fb.conectarChat = conectarChatGrupal;
        window.engine.fb.enviarChat = enviarMensajeGrupal;
    </script>
</body>
</html>
